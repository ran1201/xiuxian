<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸天万界 · 始源极意卷</title>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9e29f; --bg: #050505; --card: #111111; --text: #e0e0e0; --border: #3d341a; --red: #ff4d4d; --blue: #00a2ff; --green: #2ecc71; }
        * { box-sizing: border-box; font-family: 'STSong', 'SimSun', serif; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 50px #000; }
        
        /* 头部与状态 */
        .u-header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 12px; z-index: 10; }
        .u-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); }
        .u-info { flex: 1; }
        .u-name { font-size: 16px; font-weight: bold; color: var(--gold-l); display: flex; align-items: center; gap: 5px; }
        .u-badge { background: var(--gold); color: #000; font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
        .u-vals { font-size: 11px; color: #888; margin-top: 3px; }

        /* 分页系统 */
        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .page.active { display: flex; flex-direction: column; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 通用卡片与按钮 */
        .gold-card { background: rgba(20,20,20,0.9); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .section-title { color: var(--gold); font-size: 14px; font-weight: bold; border-left: 3px solid var(--gold); padding-left: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .btn-main { background: linear-gradient(135deg, #d4af37, #8a6d1d); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .btn-sub { background: #000; color: var(--gold); border: 1px solid var(--border); padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 10px; }

        /* 修行特效与进度 */
        .realm-text { font-size: 24px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px var(--gold); text-align: center; }
        .bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--gold); transition: 0.6s ease; }

        /* 聊天频道 (大厅与私信分离) */
        .chat-box { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; height: 320px; background: #080808; }
        .chat-tabs { display: flex; background: #111; }
        .chat-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; color: #555; cursor: pointer; border-bottom: 2px solid transparent; }
        .chat-tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: bold; background: #000; }
        .msg-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .msg-item { margin-bottom: 8px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }
        .msg-sender { color: var(--gold); font-weight: bold; margin-right: 5px; cursor: pointer; }

        /* 背包与商店列表 */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-card { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; position: relative; }
        .item-name { color: var(--gold-l); font-size: 13px; font-weight: bold; }
        .item-desc { font-size: 10px; color: #777; margin: 5px 0; }

        /* 底部导航 */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #555; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }
        .nav-ico { font-size: 22px; margin-bottom: 3px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
    <!-- 1. 认证页 (注册需QQ，登录仅需道号密钥) -->
    <div id="p-auth" class="page active" style="justify-content:center; text-align:center;">
        <h2 style="color:var(--gold); letter-spacing:6px; margin-bottom:30px;">诸天万界</h2>
        <div class="gold-card">
            <input id="auth-n" placeholder="道号">
            <input id="auth-p" type="password" placeholder="神识密钥">
            <div id="reg-box" style="display:none;">
                <input id="auth-q" placeholder="绑定 QQ (仅注册需要)">
            </div>
            <button id="auth-btn" class="btn-main" style="width:100%" onclick="doAuth()">归位入世</button>
            <div style="margin-top:20px; font-size:12px; color:var(--gold);">
                <span id="auth-toggle" onclick="toggleReg()">尚未降生？点击注册</span>
            </div>
        </div>
    </div>

    <!-- 游戏主架构 -->
    <div id="game-main" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="u-header">
            <img id="u-avatar" class="u-avatar" src="" onclick="triggerAvatar()">
            <input type="file" id="avatar-in" style="display:none" onchange="uploadAvatar()">
            <div class="u-info">
                <div class="u-name"><span id="u-n"></span><span id="u-t" class="u-badge"></span></div>
                <div class="u-vals">灵石:<span id="u-m" style="color:var(--gold)"></span> | 贡献:<span id="u-c" style="color:var(--blue)"></span></div>
            </div>
            <button class="btn-sub" onclick="doCheckin()">请安签到</button>
        </div>

        <!-- 洞府：修炼、购买修为、双修 -->
        <div id="p-cave" class="page">
            <div class="gold-card" style="text-align:center;">
                <div id="u-realm" class="realm-text"></div>
                <div class="bar-bg"><div id="exp-bar" class="bar-fill"></div></div>
                <div style="font-size:10px; color:#555;">修为: <span id="u-exp-txt"></span></div>
                
                <button class="btn-main" style="width:150px; height:150px; border-radius:50%; margin:20px 0; font-size:22px;" onclick="doPractice()">吞吐灵气</button>
                
                <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--gold-l);">
                    <span>今日上限: <span id="u-daily"></span>/2000</span>
                    <span id="u-comp">道侣: 无</span>
                </div>
            </div>
            <div class="gold-card">
                <div class="section-title">灵丹妙药 (灵石换修为)</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-sub" style="flex:1" onclick="buyExp(1000, 500)">淬体丹 (1k灵石 -> 500修为)</button>
                    <button class="btn-sub" style="flex:1" onclick="buyExp(5000, 3000)">聚灵丹 (5k灵石 -> 3k修为)</button>
                </div>
            </div>
            <div class="gold-card">
                <div class="section-title">寻找道侣 (优化双修)</div>
                <input id="comp-n" placeholder="意中人道号">
                <button class="btn-main" style="width:100%" onclick="propose()">结为道侣</button>
            </div>
        </div>

        <!-- 宗门：管理与贡献购买 -->
        <div id="p-sect" class="page">
            <div id="s-none" style="display:none;">
                <div class="gold-card">
                    <div class="section-title">创立宗门</div>
                    <input id="new-s-n" placeholder="宗门名">
                    <button class="btn-main" style="width:100%" onclick="createSect()">开宗立派 (5000灵石)</button>
                </div>
                <div class="gold-card"><div class="section-title">宗门名录</div><div id="all-s"></div></div>
            </div>
            <div id="s-hall" style="display:none;">
                <div class="gold-card">
                    <div class="section-title"><span id="s-name"></span><button class="btn-sub" onclick="quitSect()">脱离</button></div>
                    <div style="font-size:13px;">我的职位: <span id="s-pos" style="color:var(--gold)"></span></div>
                </div>
                <div class="gold-card">
                    <div class="section-title">宗门底蕴 (购买贡献)</div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-sub" style="flex:1" onclick="buyContrib(2000, 1000)">上缴2k灵石 (得1k贡献)</button>
                        <button class="btn-sub" style="flex:1" onclick="buyContrib(10000, 6000)">捐献1w灵石 (得6k贡献)</button>
                    </div>
                </div>
                <div id="s-admin" class="gold-card" style="display:none; border-color:var(--gold);">
                    <div class="section-title">宗主管理</div>
                    <input id="prom-n" placeholder="弟子名">
                    <button class="btn-main" style="width:100%" onclick="promote()">晋升弟子职级</button>
                </div>
                <div class="gold-card"><div class="section-title">同门修士</div><div id="s-mems"></div></div>
            </div>
        </div>

        <!-- 诸天：神识频道与百宝阁 -->
        <div id="p-world" class="page">
            <div class="chat-box">
                <div class="chat-tabs">
                    <div id="tab-w" class="chat-tab active" onclick="switchChat('WORLD')">世界大厅</div>
                    <div id="tab-p" class="chat-tab" onclick="switchChat('PRIV')">神识私传</div>
                </div>
                <div id="msg-list" class="msg-list"></div>
                <div style="display:flex; padding:8px; gap:8px; background:#000;">
                    <input id="chat-in" style="margin:0; flex:1;" placeholder="传音...">
                    <button class="btn-main" style="padding:0 15px;" onclick="sendMsg()">传</button>
                </div>
            </div>
            
            <div class="gold-card" style="margin-top:15px;">
                <div class="section-title">百宝阁 (法宝自带修炼加成)</div>
                <div class="item-grid">
                    <div class="item-card">
                        <div class="item-name">【乾坤鼎】</div>
                        <div class="item-desc">修炼速度提升 50%</div>
                        <button class="btn-sub" style="width:100%" onclick="buyItem('artifact_1', '乾坤鼎', 50000)">5w灵石</button>
                    </div>
                    <div class="item-card">
                        <div class="item-name">【幽冥珠】</div>
                        <div class="item-desc">修炼获得双倍贡献</div>
                        <button class="btn-sub" style="width:100%" onclick="buyItem('artifact_2', '幽冥珠', 30000)">3w灵石</button>
                    </div>
                </div>
            </div>
            
            <div class="gold-card">
                <div class="section-title">战力榜 (主宰不上榜)</div>
                <div id="rank-list"></div>
            </div>
        </div>

        <!-- 背包：物品管理与赠送 -->
        <div id="p-bag" class="page">
            <div class="gold-card">
                <div class="section-title">我的乾坤袋</div>
                <div id="bag-list" class="item-grid"></div>
            </div>
            <div id="gift-box" class="gold-card" style="display:none;">
                <div class="section-title">宝物赠送</div>
                <p id="gift-item-name" style="font-size:12px; color:var(--gold);"></p>
                <input id="gift-target" placeholder="接收者道号">
                <button class="btn-main" style="width:100%" onclick="confirmGift()">确认赠送</button>
            </div>
        </div>

        <!-- 主宰：Ran 专用控制 -->
        <div id="p-admin" class="page">
            <div class="gold-card" style="border-color:var(--red);">
                <div class="section-header" style="color:var(--red);">天道造物 (直接创号)</div>
                <input id="adm-n" placeholder="道号">
                <input id="adm-p" placeholder="密钥">
                <button class="btn-main" style="width:100%; background:var(--red);" onclick="admCreate()">创造生命</button>
            </div>
            <div class="gold-card" style="border-color:var(--red);">
                <div class="section-header">神之奖惩</div>
                <input id="adm-t" placeholder="目标 (空则全服)">
                <input id="adm-a" type="number" placeholder="数额">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <button class="btn-main" style="flex:1" onclick="admReward('single')">赐予</button>
                    <button class="btn-main" style="flex:1; background:var(--red);" onclick="admReward('all')">全服普降</button>
                </div>
                <button class="btn-sub" style="width:100%; color:var(--red);" onclick="admAction('ban')">禁锢神魂</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="nav('cave')"><span class="nav-ico">🧘</span>洞府</div>
            <div class="nav-item" onclick="nav('sect')"><span class="nav-ico">⛩️</span>宗门</div>
            <div class="nav-item" onclick="nav('world')"><span class="nav-ico">🌍</span>诸天</div>
            <div class="nav-item" onclick="nav('bag')"><span class="nav-ico">🎒</span>背包</div>
            <div id="nav-adm" class="nav-item" style="display:none; color:var(--red);" onclick="nav('admin')"><span class="nav-ico">⚖️</span>主宰</div>
        </nav>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);
    
    let me = null, isReg = false, chatMode = 'WORLD', selectedGiftItem = null;
    const REALMS = ["炼气","筑基","金丹","元婴","化神","合体","渡劫","大乘","人仙","地仙","天仙","金仙","大罗","准圣","圣人","天道主宰"];

    function toggleReg() {
        isReg = !isReg;
        document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
        document.getElementById('auth-btn').innerText = isReg ? '降生注册' : '归位入世';
        document.getElementById('auth-toggle').innerText = isReg ? '已有神魂？点击登录' : '尚未降生？点击注册';
    }

    async function doAuth() {
        const n = document.getElementById('auth-n').value.trim();
        const p = document.getElementById('auth-p').value.trim();
        const q = document.getElementById('auth-q').value.trim();

        if (isReg) {
            if(!n || !p || !q) return alert("注册需完整信息");
            const {data:qc} = await _db.from('players').select('id').eq('qq_number', q);
            if(qc && qc.length>0) return alert("QQ已绑定");
            const {error} = await _db.from('players').insert([{name:n, password:p, qq_number:q}]);
            if(error) return alert("道号已被占用");
            alert("注册成功"); toggleReg();
        } else {
            const {data, error} = await _db.from('players').select('*').eq('name', n).eq('password', p).single();
            if(!data) return alert("道号或密钥错误");
            if(data.is_banned) return alert("神魂已被封印");
            me = data; goWorld();
        }
    }

    function goWorld() {
        document.getElementById('p-auth').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        if(me.is_admin) document.getElementById('nav-adm').style.display = 'flex';
        refresh(); startRT();
    }

    async function refresh() {
        // 重新获取自身最新状态
        const {data} = await _db.from('players').select('*').eq('id', me.id).single();
        me = data;
        
        document.getElementById('u-n').innerText = me.name;
        document.getElementById('u-t').innerText = me.title;
        document.getElementById('u-m').innerText = me.money;
        document.getElementById('u-c').innerText = me.contribution;
        document.getElementById('u-avatar').src = me.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed='+me.name;
        
        const ri = Math.min(Math.floor(me.exp/5000), 15);
        document.getElementById('u-realm').innerText = REALMS[ri];
        document.getElementById('exp-bar').style.width = ((me.exp % 5000)/5000)*100 + '%';
        document.getElementById('u-exp-txt').innerText = `${me.exp} / ${(ri+1)*5000}`;
        document.getElementById('u-daily').innerText = me.daily_exp_count || 0;
        document.getElementById('u-comp').innerText = "道侣: " + (me.companion_name || "无");

        loadSect(); loadMsgs(); loadRank(); loadBag();
    }

    // --- 修炼逻辑 (含法宝加成 & 双修) ---
    async function doPractice() {
        const td = new Date().toISOString().split('T')[0];
        if(me.daily_exp_count >= 2000 && me.last_practice_date === td) return alert("今日灵气已盈满");
        
        // 法宝加成计算
        let expBase = me.companion_name ? 200 : 100;
        let conBase = me.sect ? 10 : 0;
        
        if(me.equipped_artifact === 'artifact_1') expBase *= 1.5; // 乾坤鼎加成
        if(me.equipped_artifact === 'artifact_2') conBase *= 2;   // 幽冥珠加成
        
        const {data} = await _db.from('players').update({
            exp: me.exp + expBase,
            daily_exp_count: (me.last_practice_date === td ? me.daily_exp_count : 0) + expBase,
            contribution: me.contribution + conBase,
            last_practice_date: td
        }).eq('id', me.id).select().single();
        me = data; refresh();
    }

    async function buyExp(cost, gain) {
        if(me.money < cost) return alert("灵石不足");
        const {data} = await _db.from('players').update({money: me.money - cost, exp: me.exp + gain}).eq('id', me.id).select().single();
        me = data; refresh(); alert("丹药入体，修为大增");
    }

    // --- 背包与赠送逻辑 ---
    async function loadBag() {
        const {data} = await _db.from('inventory').select('*').eq('owner_name', me.name);
        document.getElementById('bag-list').innerHTML = data.map(i=>`
            <div class="item-card">
                <div class="item-name">${i.item_name}</div>
                <div style="font-size:9px; color:var(--gold);">${me.equipped_artifact === i.item_id ? '装备中' : ''}</div>
                <div style="display:flex; gap:4px; margin-top:5px;">
                    <button class="btn-sub" style="font-size:9px;" onclick="equipItem('${i.item_id}')">装备</button>
                    <button class="btn-sub" style="font-size:9px;" onclick="showGiftBox('${i.id}', '${i.item_name}')">赠送</button>
                </div>
            </div>
        `).join('');
    }

    async function buyItem(id, name, cost) {
        if(me.money < cost) return alert("灵石不足");
        await _db.from('inventory').insert([{owner_name: me.name, item_id: id, item_name: name}]);
        await _db.from('players').update({money: me.money - cost}).eq('id', me.id);
        refresh(); alert("宝物已入袋");
    }

    async function equipItem(id) {
        await _db.from('players').update({equipped_artifact: id}).eq('id', me.id);
        refresh(); alert("法宝已祭出");
    }

    function showGiftBox(id, name) {
        selectedGiftItem = id;
        document.getElementById('gift-box').style.display = 'block';
        document.getElementById('gift-item-name').innerText = "赠送: " + name;
    }

    async function confirmGift() {
        const target = document.getElementById('gift-target').value.trim();
        if(!target) return alert("请输入对方道号");
        const {data:user} = await _db.from('players').select('name').eq('name', target).single();
        if(!user) return alert("查无此修士");
        
        await _db.from('inventory').update({owner_name: target}).eq('id', selectedGiftItem);
        document.getElementById('gift-box').style.display = 'none';
        refresh(); alert("宝物已跨空传送至 " + target);
    }

    // --- 宗门与购买贡献 ---
    async function loadSect() {
        if(!me.sect) {
            document.getElementById('s-none').style.display = 'block';
            document.getElementById('s-hall').style.display = 'none';
            const {data} = await _db.from('sects').select('*');
            document.getElementById('all-s').innerHTML = data.map(s=>`<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222;"><span>${s.name}</span><button class="btn-sub" onclick="joinSect('${s.name}')">加入</button></div>`).join('');
        } else {
            document.getElementById('s-none').style.display = 'none';
            document.getElementById('s-hall').style.display = 'block';
            document.getElementById('s-name').innerText = me.sect;
            const ps = ["杂役","外门","内门","亲传","长老","宗主"];
            document.getElementById('s-pos').innerText = ps[me.sect_pos_level];
            if(me.sect_pos_level >= 5) document.getElementById('s-admin').style.display = 'block';
        }
    }

    async function buyContrib(cost, gain) {
        if(me.money < cost) return alert("灵石不足");
        if(!me.sect) return alert("请先加入宗门");
        const {data} = await _db.from('players').update({money: me.money - cost, contribution: me.contribution + gain}).eq('id', me.id).select().single();
        me = data; refresh(); alert("捐献成功，贡献提升");
    }

    // --- 聊天与神识通道 ---
    function switchChat(m) {
        chatMode = m;
        document.getElementById('tab-w').classList.toggle('active', m==='WORLD');
        document.getElementById('tab-p').classList.toggle('active', m==='PRIV');
        loadMsgs();
    }

    async function sendMsg() {
        const c = document.getElementById('chat-in').value.trim();
        let r = 'WORLD';
        if(chatMode === 'PRIV') { r = prompt("私传对象道号"); if(!r) return; }
        if(!c) return;
        await _db.from('messages').insert([{sender_name: me.name, receiver_name: r, content: c}]);
        document.getElementById('chat-in').value = '';
    }

    async function loadMsgs() {
        let q = _db.from('messages').select('*').order('created_at', {ascending:false}).limit(20);
        if(chatMode === 'WORLD') q = q.eq('receiver_name', 'WORLD');
        else q = q.or(`sender_name.eq.${me.name},receiver_name.eq.${me.name}`).neq('receiver_name', 'WORLD');
        const {data} = await q;
        document.getElementById('msg-list').innerHTML = data.reverse().map(m=>`
            <div class="msg-item"><span class="msg-sender">${m.sender_name}${m.receiver_name!=='WORLD'?' → '+m.receiver_name:''}:</span>${m.content}</div>
        `).join('');
    }

    // --- 主宰权能 ---
    async function admCreate() {
        const n = document.getElementById('adm-n').value, p = document.getElementById('adm-p').value;
        await _db.from('players').insert([{name:n, password:p, qq_number:'ADM_GOD_'+Date.now()}]);
        alert("生命已点化");
    }

    async function admReward(type) {
        const a = parseInt(document.getElementById('adm-a').value), t = document.getElementById('adm-t').value;
        if(type === 'all') {
            const {data:all} = await _db.from('players').select('id, money');
            for(let p of all) await _db.from('players').update({money: p.money + a}).eq('id', p.id);
            alert("雨露普降");
        } else {
            const {data} = await _db.from('players').select('money').eq('name', t).single();
            await _db.from('players').update({money: data.money + a}).eq('name', t);
            alert("天道恩赐");
        }
    }

    function nav(p) {
        document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function startRT() {
        _db.channel('any').on('postgres_changes',{event:'*',schema:'public'},()=>{loadMsgs(); loadRank();}).subscribe();
    }
</script>
</body>
</html>
