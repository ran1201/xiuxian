<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran · 诸天万界 (主宰版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0a0a0a; --card: #151515; --pink: #ff748c; }
        body { background: var(--bg); color: #ccc; font-family: 'STKaiti', serif; margin: 0; padding-bottom: 70px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .btn { background: #222; border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 3px; font-size: 0.9rem; }
        .input-box { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 85%; margin: 5px 0; }
        
        /* 登录注册切换 */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .auth-tab { display: flex; margin-bottom: 20px; }
        .tab-btn { color: #666; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

        #broadcast { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 5px 10px; font-size: 0.85rem; border-bottom: 1px solid var(--gold); }
        .chat-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #666; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color:var(--gold); letter-spacing: 15px; margin-bottom:30px;">诸天万界</h1>
    
    <div class="auth-tab">
        <div id="tab-login" class="tab-btn active" onclick="toggleAuth('login')">归位 (登录)</div>
        <div id="tab-reg" class="tab-btn" onclick="toggleAuth('reg')">降生 (注册)</div>
    </div>

    <!-- 登录界面 -->
    <div id="login-form" style="text-align:center; width: 100%;">
        <input type="text" id="login-name" class="input-box" placeholder="输入道号">
        <button class="btn" style="width:91%; margin-top:15px;" onclick="handleLogin()">破开虚空</button>
    </div>

    <!-- 注册界面 -->
    <div id="reg-form" style="display:none; text-align:center; width: 100%;">
        <input type="number" id="reg-qq" class="input-box" placeholder="绑定QQ号 (唯一凭证)">
        <input type="text" id="reg-name" class="input-box" placeholder="设定道号">
        <select id="reg-gender" class="input-box" style="width:91%">
            <option value="坤修">坤修 (女)</option>
            <option value="乾修">乾修 (男)</option>
        </select>
        <button class="btn" style="width:91%; margin-top:15px;" onclick="handleRegister()">注就神魂</button>
    </div>
</div>

<div id="main-ui" style="display:none;">
    <div id="broadcast">【天道】诸天祥瑞，欢迎降临...</div>
    
    <div class="container">
        <!-- 个人面板 -->
        <div id="page-profile">
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <b style="font-size:1.2rem; color:var(--gold);" id="display-name">修士</b>
                    <span id="admin-tag" style="display:none; color:var(--pink); border:1px solid var(--pink); padding:2px 5px; border-radius:4px; font-size:0.7rem;">天道主宰</span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <span>境界: <b id="display-level" style="color:var(--gold)">凡人</b></span>
                    <span>灵石: <b id="display-money">0</b></span>
                    <span>宗门: <b id="display-sect">散修</b></span>
                    <span>QQ: <b id="display-qq">--</b></span>
                </div>
            </div>

            <div class="card">
                <div style="color:var(--gold); margin-bottom:12px;">🌟 仙途操作</div>
                <button class="btn" onclick="action('train')">静坐闭关</button>
                <button class="btn" onclick="action('explore')">秘境历练</button>
                <button id="admin-btn" class="btn" style="display:none; border-color:var(--pink); color:var(--pink);" onclick="switchPage('admin')">管理天道</button>
            </div>
        </div>

        <!-- 聊天/传音 -->
        <div id="page-chat" style="display:none;">
            <div class="card">
                <div class="chat-box" id="chat-content"></div>
                <div style="display:flex; margin-top:10px;">
                    <input type="text" id="chat-input" class="input-box" style="margin:0; flex:1;" placeholder="神识传音...">
                    <button class="btn" onclick="sendMsg('normal')">传音</button>
                </div>
            </div>
        </div>

        <!-- 管理面板 (仅Ran可见) -->
        <div id="page-admin" style="display:none;">
            <div class="card">
                <div style="color:var(--pink); margin-bottom:15px;">👁️ 主宰视角</div>
                <p>在此你可以操控位面因果</p>
                <button class="btn" onclick="adminAction('gift-all')">全服赠送1000灵石</button>
                <button class="btn" onclick="adminAction('clear-chat')">肃清传音大厅</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchPage('profile')">仙途</div>
        <div class="nav-item" onclick="switchPage('chat')">传音</div>
    </div>
</div>

<script>
    // 这里填入你辛苦找回来的钥匙
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_KEY';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let me = null;

    function toggleAuth(type) {
        document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('reg-form').style.display = type === 'reg' ? 'block' : 'none';
        document.getElementById('tab-login').className = 'tab-btn ' + (type === 'login' ? 'active' : '');
        document.getElementById('tab-reg').className = 'tab-btn ' + (type === 'reg' ? 'active' : '');
    }

    // 登录逻辑：按名字搜索
    async function handleLogin() {
        const name = document.getElementById('login-name').value;
        if(!name) return alert("请输入道号");

        // 特权：如果名字是 Ran，且数据库没这个人，自动帮你生成一个，不需要QQ
        if(name === 'Ran') {
            let { data } = await _supabase.from('players').select('*').eq('name', 'Ran').single();
            if(!data) {
                const { data: adminUser } = await _supabase.from('players').insert([
                    { qq: '999999', name: 'Ran', gender: '坤修', money: 999999, level: 7, sect: '天道宫' }
                ]).select().single();
                me = adminUser;
            } else { me = data; }
            return startWorld();
        }

        // 普通人登录
        let { data, error } = await _supabase.from('players').select('*').eq('name', name).single();
        if(!data) return alert("道号不存在，请先注册");
        me = data;
        startWorld();
    }

    // 注册逻辑：必须QQ和唯一道号
    async function handleRegister() {
        const qq = document.getElementById('reg-qq').value;
        const name = document.getElementById('reg-name').value;
        const gender = document.getElementById('reg-gender').value;
        if(!qq || !name) return alert("QQ与道号必填");

        // 检查道号或QQ是否已被占用
        let { data: check } = await _supabase.from('players').select('*').or(`qq.eq.${qq},name.eq.${name}`);
        if(check && check.length > 0) return alert("道号或QQ已被占领，请换一个");

        const { data: newUser, error } = await _supabase.from('players').insert([
            { qq: qq, name: name, gender: gender, money: 500, level: 0, sect: '散修' }
        ]).select().single();
        
        if(error) return alert("注册失败：" + error.message);
        me = newUser;
        alert("神魂注就成功！");
        startWorld();
    }

    function startWorld() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        if(me.name === 'Ran') {
            document.getElementById('admin-tag').style.display = 'inline';
            document.getElementById('admin-btn').style.display = 'inline-block';
        }
        updateUI();
        syncChat();
        _supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => renderMsg(p.new)).subscribe();
    }

    function updateUI() {
        document.getElementById('display-name').innerText = me.name;
        document.getElementById('display-money').innerText = me.money;
        document.getElementById('display-sect').innerText = me.sect;
        document.getElementById('display-qq').innerText = me.qq;
    }

    async function sendMsg(type) {
        const content = document.getElementById('chat-input').value;
        if(!content) return;
        await _supabase.from('messages').insert([{ from: me.name, content: content, type: type }]);
        document.getElementById('chat-input').value = "";
    }

    async function syncChat() {
        let { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        const box = document.getElementById('chat-content');
        box.innerHTML = "";
        data.reverse().forEach(renderMsg);
    }

    function renderMsg(m) {
        const box = document.getElementById('chat-content');
        box.innerHTML += `<div style="margin-bottom:5px;"><b>${m.from}:</b> ${m.content}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function switchPage(p) {
        ['profile', 'chat', 'admin'].forEach(id => {
            const el = document.getElementById('page-'+id);
            if(el) el.style.display = (id === p) ? 'block' : 'none';
        });
    }

    async function action(type) {
        if(type === 'train') { me.money += 20; alert("获得灵石20"); }
        await _supabase.from('players').update({ money: me.money }).eq('id', me.id);
        updateUI();
    }

    async function adminAction(type) {
        if(type === 'gift-all') {
            alert("正在施展大荒施舍术...");
            // 这里可以写更新所有人的逻辑，暂以提示为主
        }
        if(type === 'clear-chat') {
            await _supabase.from('messages').delete().neq('id', 0);
            alert("言论已肃清");
            location.reload();
        }
    }
</script>
</body>
</html>
const supabaseUrl = https://fjnpzauputcotjvmrytq.supabase.co/rest/v1/;
