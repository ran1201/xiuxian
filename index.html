<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸天万界 · 敕金</title>
    <style>
        :root {
            --gold: #d4af37; --gold-light: #f9e29f; --bg: #0a0a0a; --card: #151515;
            --text: #e0e0e0; --border: #332b12;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'serif'; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { width: 95%; max-width: 500px; height: 95vh; background: var(--card); border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,1), 0 0 15px var(--border); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 金色传音条 */
        #trumpet-bar { height: 35px; background: rgba(212, 175, 55, 0.1); border-bottom: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--gold); font-weight: bold; overflow: hidden; }
        .trumpet-scroll { position: absolute; animation: scrollLeft 12s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 顶部状态栏 */
        .u-header { padding: 15px; background: linear-gradient(to bottom, #1a1a1a, #151515); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .u-avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); background: #000; cursor: pointer; }
        .u-info { flex: 1; }
        .u-rank { font-size: 16px; color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
        .u-stats { font-size: 11px; opacity: 0.7; margin-top: 3px; }

        /* 导航栏 */
        .nav { display: flex; background: #000; border-bottom: 1px solid var(--border); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; font-size: 13px; cursor: pointer; color: #666; transition: 0.3s; }
        .nav-item.active { color: var(--gold); font-weight: bold; border-bottom: 2px solid var(--gold); background: rgba(212,175,55,0.05); }

        .panel { display: none; flex: 1; overflow-y: auto; padding: 15px; flex-direction: column; }
        .panel.active { display: flex; }

        /* 通用组件 */
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }
        button { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #aa8a2e); color: #000; width: 100%; }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid var(--border); font-size: 12px; }

        .item-card { background: #1c1c1c; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #2a2a2a; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }

        /* 列表样式 */
        .avatar-sm { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); margin-right: 10px; }
        .flex-center { display: flex; align-items: center; }

        /* 私聊弹窗 */
        #pm-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
    <div id="trumpet-bar"><div class="trumpet-scroll" id="trumpet-content">金光乍现，诸天归位。</div></div>

    <!-- 登录 -->
    <div id="auth-zone" style="padding:40px 20px; text-align:center;">
        <h2 style="color:var(--gold); letter-spacing:10px;">诸天万界</h2>
        <div id="login-form">
            <input type="text" id="l-name" placeholder="道号">
            <input type="password" id="l-pw" placeholder="神魂密匙">
            <button class="btn-gold" onclick="login()">契合神魂</button>
            <p style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(true)">降生新界</p>
        </div>
        <div id="reg-form" style="display:none">
            <input type="text" id="r-name" placeholder="唯一道号">
            <input type="password" id="r-pw" placeholder="设置密匙">
            <button class="btn-gold" onclick="register()">降生</button>
            <p style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;" onclick="toggleAuth(false)">已有神魂</p>
        </div>
    </div>

    <!-- 游戏 -->
    <div id="game-zone" style="display:none; flex-direction:column; height:100%;">
        <div class="u-header">
            <img src="" id="u-avatar" class="u-avatar" onclick="changeAvatar()">
            <div class="u-info">
                <div class="u-rank" id="u-rank">加载中...</div>
                <div class="u-stats">
                    灵石: <span id="u-money" style="color:var(--gold)">0</span> | 编号: <span id="u-id">0</span>
                </div>
            </div>
            <button class="btn-dark" style="padding:5px 10px;" onclick="cultivate()">修行</button>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showPanel('social')">道友</div>
            <div class="nav-item" onclick="showPanel('sect')">宗门</div>
            <div class="nav-item" onclick="showPanel('rank')">功德</div>
            <div class="nav-item" onclick="showPanel('shop')">珍宝</div>
        </div>

        <!-- 道友面板 -->
        <div id="p-social" class="panel active">
            <div class="item-card">
                <input type="text" id="search-friend" placeholder="搜索道号或编号...">
                <button class="btn-gold" onclick="sendFriendRequest()">发送道友申请</button>
            </div>
            <div id="friend-requests"></div>
            <div style="color:var(--gold); font-size:12px; margin:10px 0;">我的道友</div>
            <div id="friend-list"></div>
        </div>

        <!-- 宗门面板 -->
        <div id="p-sect" class="panel">
            <div id="sect-none" style="display:none;">
                <div class="item-card">
                    <input type="text" id="new-sect-n" placeholder="宗门名号">
                    <button class="btn-gold" onclick="createSect()">开宗立派 (2000灵石)</button>
                </div>
                <div id="sect-list-all"></div>
            </div>
            <div id="sect-joined" style="display:none;">
                <div class="item-card" style="border:1px solid var(--gold);">
                    <h3 id="cur-sect-name" style="margin:0; color:var(--gold);"></h3>
                    <p style="font-size:12px; margin:5px 0;">等级: <span id="cur-sect-lv">1</span> | 身份: <span id="cur-sect-role"></span></p>
                    <div id="sect-leader-ctrl" style="display:none; border-top:1px solid #333; padding-top:10px; margin-top:10px;">
                        <input type="text" id="sect-target" placeholder="弟子名号">
                        <button class="btn-dark" onclick="manageSect('宗主')">禅让</button>
                        <button class="btn-dark" onclick="manageSect('副宗主')">提拔</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 排行面板 -->
        <div id="p-rank" class="panel">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn-dark" style="flex:1" onclick="loadRank('exp')">修为榜</button>
                <button class="btn-dark" style="flex:1" onclick="loadRank('money')">财富榜</button>
            </div>
            <div id="rank-content"></div>
        </div>

        <!-- 商店 -->
        <div id="p-shop" class="panel">
            <div class="item-card">
                <b>诸天传音券</b> <span style="color:var(--gold)">500灵石</span>
                <button class="btn-gold" style="margin-top:10px;" onclick="buyItem('trump')">购买</button>
            </div>
        </div>
    </div>

    <!-- 私信遮罩 -->
    <div id="pm-overlay">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
            <span id="pm-title" style="color:var(--gold)"></span>
            <span onclick="closePM()" style="cursor:pointer;">[隐匿]</span>
        </div>
        <div id="pm-content" style="flex:1; overflow-y:auto; padding:15px; font-size:14px;"></div>
        <div style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="pm-input" placeholder="输入神识内容..." style="margin:0;">
            <button class="btn-gold" style="width:70px;" onclick="sendPM()">传神</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);

    let me = null;
    let activeChatTarget = null;
    const REALMS = ["凡人","练气","筑基","金丹","元婴","化神","合体","大乘","渡劫","太乙","金仙","大罗","准圣","圣人"];

    function toggleAuth(r) {
        document.getElementById('login-form').style.display = r?'none':'block';
        document.getElementById('reg-form').style.display = r?'block':'none';
    }

    async function login() {
        const n = document.getElementById('l-name').value.trim();
        const p = document.getElementById('l-pw').value.trim();
        if(n==='Ran' && p==='mr081104'){
            enterGame({id:0, name:'Ran', exp:999999, money:999999, avatar_url:'https://api.dicebear.com/7.x/bottts/svg?seed=Ran', friends:'[]'});
            return;
        }
        const { data } = await _db.from('players').select('*').eq('name',n).eq('password',p).single();
        if(data) enterGame(data); else alert('神魂未契合');
    }

    async function register() {
        const n = document.getElementById('r-name').value.trim();
        const p = document.getElementById('r-pw').value.trim();
        const { error } = await _db.from('players').insert([{name:n, password:p, money:100}]);
        if(error) alert('此道号已在册'); else { alert('降生成功'); toggleAuth(false); }
    }

    function enterGame(p) {
        me = p;
        document.getElementById('auth-zone').style.display = 'none';
        document.getElementById('game-zone').style.display = 'flex';
        refreshUI();
        loadFriends();
        loadRequests();
        
        // 实时监听私信
        _db.channel('pm-realtime').on('postgres_changes', { event:'INSERT', schema:'public', table:'private_messages' }, p => {
            if(p.new.receiver === me.name) {
                if(activeChatTarget === p.new.sender) loadPMs();
                else alert('收到来自 ' + p.new.sender + ' 的神识传音');
            }
        }).subscribe();
    }

    function refreshUI() {
        const lv = Math.floor((me.exp||0)/1000);
        document.getElementById('u-rank').innerText = REALMS[lv] || "无极";
        document.getElementById('u-money').innerText = me.money;
        document.getElementById('u-id').innerText = me.id;
        document.getElementById('u-avatar').src = me.avatar_url;
        
        if(me.sect) {
            document.getElementById('sect-none').style.display = 'none';
            document.getElementById('sect-joined').style.display = 'block';
            document.getElementById('cur-sect-name').innerText = me.sect;
            document.getElementById('cur-sect-role').innerText = me.sect_role;
            document.getElementById('sect-leader-ctrl').style.display = me.sect_role==='宗主'?'block':'none';
        } else {
            document.getElementById('sect-none').style.display = 'block';
            document.getElementById('sect-joined').style.display = 'none';
        }
    }

    async function changeAvatar() {
        const url = prompt("输入新的法相URL (图片链接):", me.avatar_url);
        if(url) {
            me.avatar_url = url;
            refreshUI();
            await _db.from('players').update({avatar_url: url}).eq('id', me.id);
        }
    }

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        event.target.classList.add('active');
        if(id === 'rank') loadRank('exp');
        if(id === 'sect' && !me.sect) loadAllSects();
    }

    async function cultivate() {
        const today = new Date().toDateString();
        if(me.last_op_date === today && me.daily_count >= 50) return alert('今日经脉已达上限');
        me.daily_count = (me.last_op_date === today) ? (me.daily_count||0)+1 : 1;
        me.last_op_date = today;
        me.exp = (me.exp||0)+15; me.money += 10;
        refreshUI();
        await _db.from('players').update({exp:me.exp, money:me.money, daily_count:me.daily_count, last_op_date:today}).eq('id',me.id);
    }

    /* 好友逻辑 */
    async function sendFriendRequest() {
        const val = document.getElementById('search-friend').value.trim();
        const query = isNaN(val) ? _db.from('players').select('id,name').eq('name', val).single() : _db.from('players').select('id,name').eq('id', val).single();
        const { data } = await query;
        if(!data) return alert('查无此人');
        await _db.from('friend_requests').insert([{ sender_id: me.id, sender_name: me.name, receiver_id: data.id }]);
        alert('申请已发出');
    }

    async function loadRequests() {
        const { data } = await _db.from('friend_requests').select('*').eq('receiver_id', me.id).eq('status','pending');
        const box = document.getElementById('friend-requests');
        box.innerHTML = data?.length ? '<div style="font-size:12px; color:var(--gold)">神识申请</div>' : '';
        data?.forEach(r => {
            box.innerHTML += `<div class="list-row"><span>${r.sender_name}</span><button class="btn-dark" onclick="acceptFriend(${r.sender_id},'${r.sender_name}',${r.id})">缔结</button></div>`;
        });
    }

    async function acceptFriend(fid, fname, rid) {
        let flist = JSON.parse(me.friends || '[]');
        if(!flist.includes(fid)) flist.push({id:fid, name:fname});
        me.friends = JSON.stringify(flist);
        await _db.from('players').update({friends: me.friends}).eq('id', me.id);
        await _db.from('friend_requests').update({status:'accepted'}).eq('id', rid);
        // 对向也要加
        const {data} = await _db.from('players').select('friends').eq('id', fid).single();
        let oflist = JSON.parse(data.friends || '[]');
        oflist.push({id:me.id, name:me.name});
        await _db.from('players').update({friends: JSON.stringify(oflist)}).eq('id', fid);
        loadFriends(); loadRequests();
    }

    async function loadFriends() {
        const flist = JSON.parse(me.friends || '[]');
        const box = document.getElementById('friend-list');
        box.innerHTML = '';
        flist.forEach(f => {
            box.innerHTML += `<div class="list-row" onclick="openChat('${f.name}')" style="cursor:pointer">
                <div class="flex-center"><img src="https://api.dicebear.com/7.x/identicon/svg?seed=${f.name}" class="avatar-sm"><span>${f.name}</span></div>
                <span style="color:#444; font-size:10px;">点击私传</span>
            </div>`;
        });
    }

    /* 私传 */
    function openChat(name) {
        activeChatTarget = name;
        document.getElementById('pm-overlay').style.display = 'flex';
        document.getElementById('pm-title').innerText = "与 " + name + " 的神识连结";
        loadPMs();
    }
    function closePM() { document.getElementById('pm-overlay').style.display = 'none'; activeChatTarget = null; }

    async function loadPMs() {
        const { data } = await _db.from('private_messages')
            .select('*')
            .or(`and(sender.eq.${me.name},receiver.eq.${activeChatTarget}),and(sender.eq.${activeChatTarget},receiver.eq.${me.name})`)
            .order('created_at',{ascending:true});
        const box = document.getElementById('pm-content');
        box.innerHTML = data.map(m => `<div style="margin-bottom:10px; text-align:${m.sender===me.name?'right':'left'}">
            <small style="color:var(--gold)">${m.sender}</small><br>${m.content}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendPM() {
        const c = document.getElementById('pm-input').value.trim();
        if(!c) return;
        await _db.from('private_messages').insert([{sender:me.name, receiver:activeChatTarget, content:c}]);
        document.getElementById('pm-input').value = '';
        loadPMs();
    }

    /* 排行 */
    async function loadRank(type) {
        const { data } = await _db.from('players').select('name,exp,money,avatar_url').neq('name','Ran').order(type, {ascending:false}).limit(10);
        const box = document.getElementById('rank-content');
        box.innerHTML = `<h4 style="color:var(--gold); text-align:center;">诸天 · ${type==='exp'?'修为':'灵石'}榜</h4>`;
        data?.forEach((p, i) => {
            box.innerHTML += `<div class="list-row">
                <div class="flex-center"><span style="width:20px;">${i+1}</span><img src="${p.avatar_url}" class="avatar-sm"><span>${p.name}</span></div>
                <span style="color:var(--gold)">${type==='exp'?p.exp:p.money}</span>
            </div>`;
        });
    }

    /* 宗门 */
    async function loadAllSects() {
        const { data } = await _db.from('sects').select('*');
        const box = document.getElementById('sect-list-all'); box.innerHTML = '';
        data?.forEach(s => {
            box.innerHTML += `<div class="item-card"><b>${s.name}</b> <small>(Lv.${s.level})</small>
                <button class="btn-dark" style="float:right" onclick="joinSect('${s.name}')">拜入</button></div>`;
        });
    }
    async function joinSect(n) {
        await _db.from('players').update({sect:n, sect_role:'弟子'}).eq('id', me.id);
        me.sect = n; me.sect_role = '弟子'; refreshUI();
    }
    async function createSect() {
        const n = document.getElementById('new-sect-n').value.trim();
        if(me.money < 2000) return alert('灵石不足');
        await _db.from('sects').insert([{name:n, leader:me.name}]);
        me.money -= 2000; me.sect = n; me.sect_role = '宗主';
        await _db.from('players').update({money:me.money, sect:n, sect_role:'宗主'}).eq('id', me.id);
        refreshUI();
    }
</script>
</body>
</html>
