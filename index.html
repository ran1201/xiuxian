<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸天万界 · 始源大一统</title>
    <style>
        :root { --gold: #d4af37; --gold-l: #f9e29f; --bg: #050505; --card: #121212; --text: #e0e0e0; --border: #3d341a; --red: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', serif; margin: 0; overflow: hidden; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        
        /* 头部 */
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 12px; z-index: 100; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .u-info { flex: 1; }
        .u-name-row { display: flex; align-items: center; gap: 8px; }
        .u-title-tag { background: var(--gold); color: #000; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: bold; }
        
        /* 页面容器 */
        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; animation: fadeIn 0.3s ease; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 通用卡片 */
        .gold-card { background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .section-title { color: var(--gold); font-size: 14px; font-weight: bold; border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        
        /* 按钮与输入 */
        .btn-gold { background: linear-gradient(135deg, var(--gold), #8a6d1d); color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); opacity: 0.8; }
        .btn-dark { background: #000; color: var(--gold); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 12px; }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 12px; }

        /* 聊天系统 */
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #080808; border-radius: 12px; border: 1px solid var(--border); }
        .chat-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .chat-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; color: #666; cursor: pointer; }
        .chat-tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: #111; }
        .msg-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .msg-item { margin-bottom: 8px; line-height: 1.6; }
        .msg-sender { color: var(--gold); font-weight: bold; margin-right: 5px; cursor: pointer; }
        .msg-content { color: #ccc; }

        /* 导航 */
        .nav-bottom { position: absolute; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #555; transition: 0.3s; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        
        /* 主宰特权视觉 */
        .admin-glow { border: 1px solid var(--red); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--gold); transition: 0.5s; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
    <!-- 登录注册 -->
    <div id="p-auth" class="page active" style="justify-content:center; text-align:center;">
        <h1 style="color:var(--gold); font-size:32px; letter-spacing:8px;">诸天万界</h1>
        <p style="color:#666; font-size:12px; margin-top:-10px;">—— 唯主宰 Ran 永恒 ——</p>
        <div class="gold-card" style="margin-top:30px;">
            <input id="auth-name" placeholder="修士道号">
            <input id="auth-pw" type="password" placeholder="神识密钥">
            <button class="btn-gold" style="width:100%" onclick="handleAuth('login')">归位</button>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn-dark" style="flex:1" onclick="handleAuth('reg')">初生降世</button>
            </div>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-main" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="header">
            <img id="u-avatar" class="avatar" src="" onclick="triggerAvatar()">
            <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar()">
            <div class="u-info">
                <div class="u-name-row">
                    <span id="u-name" style="font-weight:bold; color:var(--gold-l);"></span>
                    <span id="u-title" class="u-title-tag"></span>
                </div>
                <div style="font-size:11px; margin-top:4px;">
                    灵石: <span id="u-money" style="color:var(--gold)"></span> | 
                    贡献: <span id="u-contrib" style="color:#4db8ff"></span>
                </div>
            </div>
            <button class="btn-dark" onclick="doCheckin()">每日签到</button>
        </div>

        <!-- 1. 洞府: 修炼、任务、双修 -->
        <div id="p-cave" class="page">
            <div class="gold-card" style="text-align:center;">
                <div id="u-realm" style="color:var(--gold); font-weight:bold; font-size:18px;"></div>
                <div class="progress-bar"><div id="exp-progress" class="progress-inner"></div></div>
                <div style="font-size:10px; color:#555; margin-top:5px;">修为: <span id="u-exp-val"></span></div>
                
                <button class="btn-gold" style="width:140px; height:140px; border-radius:50%; margin:20px 0; font-size:20px;" onclick="doPractice()">运转周天</button>
                
                <div style="display:flex; justify-content:space-around; font-size:12px;">
                    <div>今日灵气: <span id="u-daily-exp">0</span>/2000</div>
                    <div id="u-companion">道侣: 无</div>
                </div>
            </div>
            
            <div class="gold-card">
                <div class="section-title">天道敕令任务</div>
                <div id="task-list"></div>
            </div>
        </div>

        <!-- 2. 宗门: 职位、成员、宝阁、创建 -->
        <div id="p-sect" class="page">
            <div id="sect-none" style="display:none;">
                <div class="gold-card">
                    <div class="section-title">开宗立派</div>
                    <input id="new-sect-n" placeholder="输入宗门名 (需5000灵石)">
                    <button class="btn-gold" style="width:100%" onclick="createSect()">敕建宗门</button>
                </div>
                <div class="gold-card">
                    <div class="section-title">依附强宗</div>
                    <div id="all-sects-list"></div>
                </div>
            </div>
            <div id="sect-hall" style="display:none;">
                <div class="gold-card">
                    <div class="section-title"><span id="s-name"></span> <button class="btn-dark" onclick="quitSect()">叛出宗门</button></div>
                    <div style="font-size:13px;">我的职位: <span id="s-pos" style="color:var(--gold)"></span></div>
                </div>
                <!-- 宗门宝阁 -->
                <div class="gold-card">
                    <div class="section-title">宗门宝阁 (消耗贡献度)</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button class="btn-dark" onclick="buySectItem('title', 500)">购买头衔 (500)</button>
                        <button class="btn-dark" onclick="buySectItem('money', 1000)">支取灵石 (1000)</button>
                    </div>
                </div>
                <div id="sect-admin-box" class="gold-card" style="display:none; border:1px solid var(--gold);">
                    <div class="section-title">宗主大权</div>
                    <input id="promote-target" placeholder="弟子道号">
                    <button class="btn-gold" style="width:100%" onclick="promoteDisciple()">提拔弟子</button>
                </div>
                <div class="gold-card">
                    <div class="section-title">同门修士</div>
                    <div id="sect-members"></div>
                </div>
            </div>
        </div>

        <!-- 3. 诸天: 大厅、私信、百宝阁、排行榜 -->
        <div id="p-world" class="page">
            <div class="chat-container" style="height:300px; margin-bottom:15px;">
                <div class="chat-tabs">
                    <div id="tab-world" class="chat-tab active" onclick="switchChat('WORLD')">世界大厅</div>
                    <div id="tab-private" class="chat-tab" onclick="switchChat('PRIVATE')">神识传音</div>
                </div>
                <div id="msg-list" class="msg-list"></div>
                <div style="display:flex; padding:8px; gap:5px; border-top:1px solid var(--border);">
                    <input id="chat-input" style="margin:0; flex:1;" placeholder="请输入...">
                    <button class="btn-gold" onclick="sendMsg()">传音</button>
                </div>
            </div>

            <div class="gold-card">
                <div class="section-title">诸天百宝阁 (灵石消耗)</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-dark" onclick="openShop('rename')">《易名金册》(1万)</button>
                    <button class="btn-dark" onclick="openShop('title')">《帝号残卷》(5千)</button>
                </div>
            </div>

            <div class="gold-card">
                <div class="section-title">诸天战力榜</div>
                <div id="rank-list"></div>
            </div>
        </div>

        <!-- 4. 主宰: Ran 专属管理 -->
        <div id="p-admin" class="page">
            <div class="gold-card admin-glow">
                <div class="section-title" style="color:var(--red)">天道裁决 · 众生管理</div>
                <input id="adm-target" placeholder="目标道号">
                <input id="adm-amount" type="number" placeholder="灵石数量">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <button class="btn-gold" style="flex:1" onclick="adminAddMoney('single')">单独赐予</button>
                    <button class="btn-gold" style="flex:1; background:var(--red); color:#fff;" onclick="adminAddMoney('all')">全服灵石雨</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-dark" style="flex:1" onclick="adminAction('ban')">封印神魂(禁言/封号)</button>
                    <button class="btn-dark" style="flex:1" onclick="adminAction('del_sect')">强拆宗门</button>
                </div>
            </div>
            
            <div class="gold-card admin-glow">
                <div class="section-title">发布天道敕令 (全服任务)</div>
                <input id="adm-task-c" placeholder="任务内容...">
                <button class="btn-gold" style="width:100%" onclick="adminPostTask()">颁布敕令</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="nav-bottom">
            <div class="nav-item active" onclick="navTo('cave')"><span class="nav-icon">🧘</span><span>洞府</span></div>
            <div class="nav-item" onclick="navTo('sect')"><span class="nav-icon">⛩️</span><span>宗门</span></div>
            <div class="nav-item" onclick="navTo('world')"><span class="nav-icon">🌍</span><span>诸天</span></div>
            <div id="nav-admin" class="nav-item" style="display:none; color:var(--red)" onclick="navTo('admin')">
                <span class="nav-icon">⚖️</span><span>主宰</span>
            </div>
        </nav>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);
    
    let me = null;
    let currentChat = 'WORLD'; 
    const REALMS = ["炼气", "筑基", "金丹", "元婴", "化神", "合体", "渡劫", "大乘", "人仙", "地仙", "天仙", "金仙", "大罗金仙", "准圣", "圣人", "天道主宰"];

    // --- 核心认证 ---
    async function handleAuth(type) {
        const n = document.getElementById('auth-name').value.trim();
        const p = document.getElementById('auth-pw').value.trim();
        if(!n || !p) return alert("请输入道号及神识密钥");
        
        if(type === 'reg') {
            const {error} = await _db.from('players').insert([{name:n, password:p}]);
            if(error) return alert("道号已被占用");
            alert("降生成功！");
        }
        
        const {data, error} = await _db.from('players').select('*').eq('name',n).eq('password',p).single();
        if(!data) return alert("道号或神识密钥有误");
        if(data.is_banned) return alert("你的神魂已被封印，无法入世");
        
        enterGame(data);
    }

    function enterGame(data) {
        me = data;
        document.getElementById('p-auth').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        if(me.is_admin) document.getElementById('nav-admin').style.display = 'flex';
        
        updateUI();
        loadRank();
        loadTasks();
        loadSectInfo();
        startRealtime();
    }

    function updateUI() {
        document.getElementById('u-name').innerText = me.name;
        document.getElementById('u-title').innerText = me.title || '散修';
        document.getElementById('u-money').innerText = me.money;
        document.getElementById('u-contrib').innerText = me.contribution;
        document.getElementById('u-avatar').src = me.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + me.name;
        
        const rIdx = Math.min(Math.floor(me.exp / 5000), REALMS.length - 1);
        document.getElementById('u-realm').innerText = REALMS[rIdx];
        const progress = ((me.exp % 5000) / 5000) * 100;
        document.getElementById('exp-progress').style.width = progress + '%';
        document.getElementById('u-exp-val').innerText = `${me.exp} / ${(rIdx+1)*5000}`;
        document.getElementById('u-daily-exp').innerText = me.daily_exp_count || 0;
        document.getElementById('u-companion').innerText = "道侣: " + (me.companion_name || "无");
    }

    // --- 修炼与签到 ---
    async function doCheckin() {
        const today = new Date().toISOString().split('T')[0];
        if(me.last_checkin === today) return alert("今日已领过灵石");
        const {data} = await _db.from('players').update({money: me.money + 500, last_checkin: today}).eq('id', me.id).select().single();
        me = data; updateUI(); alert("签到成功，灵石+500");
    }

    async function doPractice() {
        const today = new Date().toISOString().split('T')[0];
        if(me.last_practice_date !== today) { me.daily_exp_count = 0; me.last_practice_date = today; }
        if(me.daily_exp_count >= 2000) return alert("今日灵气已满，强行修炼恐有爆体之灾");
        
        let add = 100;
        if(me.companion_name) add = 200; // 双修加成
        const {data} = await _db.from('players').update({
            exp: me.exp + add, 
            daily_exp_count: me.daily_exp_count + add,
            last_practice_date: today
        }).eq('id', me.id).select().single();
        me = data; updateUI();
    }

    // --- 宗门系统 ---
    async function loadSectInfo() {
        if(!me.sect) {
            document.getElementById('sect-none').style.display = 'block';
            document.getElementById('sect-hall').style.display = 'none';
            const {data} = await _db.from('sects').select('*');
            document.getElementById('all-sects-list').innerHTML = data.map(s => `
                <div class="gold-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>${s.name} (宗主: ${s.master_name})</span>
                    <button class="btn-dark" onclick="joinSect('${s.name}')">申请加入</button>
                </div>
            `).join('');
        } else {
            document.getElementById('sect-none').style.display = 'none';
            document.getElementById('sect-hall').style.display = 'block';
            document.getElementById('s-name').innerText = me.sect;
            const posNames = ["杂役", "外门弟子", "内门弟子", "亲传弟子", "护法长老", "宗主"];
            document.getElementById('s-pos').innerText = posNames[me.sect_pos_level];
            if(me.sect_pos_level >= 5) document.getElementById('sect-admin-box').style.display = 'block';
            
            const {data} = await _db.from('players').select('name, sect_pos_level').eq('sect', me.sect);
            document.getElementById('sect-members').innerHTML = data.map(m => `
                <div style="font-size:12px; border-bottom:1px solid #222; padding:5px 0;">
                    [${posNames[m.sect_pos_level]}] ${m.name}
                </div>
            `).join('');
        }
    }

    async function createSect() {
        const n = document.getElementById('new-sect-n').value.trim();
        if(me.money < 5000) return alert("灵石不足以支撑开宗立派");
        await _db.from('sects').insert([{name:n, master_name:me.name}]);
        const {data} = await _db.from('players').update({sect:n, sect_pos_level:5, money:me.money-5000}).eq('id', me.id).select().single();
        me = data; updateUI(); loadSectInfo();
    }

    async function joinSect(sn) {
        const {data} = await _db.from('players').update({sect:sn, sect_pos_level:0}).eq('id', me.id).select().single();
        me = data; loadSectInfo();
    }
    
    async function quitSect() {
        if(confirm("确定要叛出宗门吗？修为可能受损。")) {
            const {data} = await _db.from('players').update({sect:null, sect_pos_level:0}).eq('id', me.id).select().single();
            me = data; updateUI(); loadSectInfo();
        }
    }

    // --- 聊天系统 ---
    function switchChat(tab) {
        currentChat = tab;
        document.getElementById('tab-world').classList.toggle('active', tab==='WORLD');
        document.getElementById('tab-private').classList.toggle('active', tab==='PRIVATE');
        loadMessages();
    }

    async function sendMsg() {
        const content = document.getElementById('chat-input').value.trim();
        if(!content) return;
        let receiver = 'WORLD';
        if(currentChat === 'PRIVATE') {
            receiver = prompt("请输入对方道号:");
            if(!receiver) return;
        }
        await _db.from('messages').insert([{sender_name: me.name, receiver_name: receiver, content}]);
        document.getElementById('chat-input').value = '';
    }

    async function loadMessages() {
        let q = _db.from('messages').select('*').order('created_at', {ascending:false}).limit(30);
        if(currentChat === 'WORLD') q = q.eq('receiver_name', 'WORLD');
        else q = q.or(`sender_name.eq.${me.name},receiver_name.eq.${me.name}`).neq('receiver_name', 'WORLD');
        
        const {data} = await q;
        document.getElementById('msg-list').innerHTML = data.reverse().map(m => `
            <div class="msg-item">
                <span class="msg-sender" onclick="openPrivate('${m.sender_name}')">${m.sender_name}${m.receiver_name!=='WORLD'?' -> '+m.receiver_name:''}:</span>
                <span class="msg-content">${m.content}</span>
            </div>
        `).join('');
        const list = document.getElementById('msg-list');
        list.scrollTop = list.scrollHeight;
    }

    // --- 主宰管理 ---
    async function adminAddMoney(type) {
        const amount = parseInt(document.getElementById('adm-amount').value);
        if(type === 'all') {
            const {data: all} = await _db.from('players').select('id, money');
            for(let p of all) await _db.from('players').update({money: p.money + amount}).eq('id', p.id);
            alert("普降雨露成功");
        } else {
            const t = document.getElementById('adm-target').value;
            const {data} = await _db.from('players').select('money').eq('name', t).single();
            await _db.from('players').update({money: data.money + amount}).eq('name', t);
            alert("赐予成功");
        }
    }

    async function adminAction(type) {
        const t = document.getElementById('adm-target').value;
        if(type==='ban') await _db.from('players').update({is_banned: true}).eq('name', t);
        if(type==='del_sect') await _db.from('sects').delete().eq('name', t);
        alert("因果已斩断");
    }

    function navTo(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    async function loadRank() {
        const {data} = await _db.from('players').select('name, exp').neq('name', 'Ran').order('exp', {ascending:false}).limit(10);
        document.getElementById('rank-list').innerHTML = data.map((r,i) => `
            <div style="padding:8px; border-bottom:1px solid #222; display:flex; justify-content:space-between;">
                <span>#${i+1} ${r.name}</span>
                <span style="color:var(--gold)">${r.exp} 修为</span>
            </div>
        `).join('');
    }

    async function loadTasks() {
        const {data} = await _db.from('heaven_tasks').select('*');
        document.getElementById('task-list').innerHTML = data.map(t => `
            <div class="gold-card" style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">${t.content}</span>
                <button class="btn-dark" onclick="doTask(${t.id}, ${t.reward_money}, ${t.reward_exp})">领赏</button>
            </div>
        `).join('');
    }

    function startRealtime() {
        _db.channel('any').on('postgres_changes', {event:'*', schema:'public'}, () => {
            loadMessages();
            loadRank();
        }).subscribe();
    }
</script>
</body>
</html>
