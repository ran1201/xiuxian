<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸天万界</title>
    <style>
        :root {
            --gold: #ffd700;
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --pink: #ff748c;
            --text: #e0e0e0;
            --border: #333;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0a1a 0%, #0d0d0d 100%);
        }
        #app {
            width: 95%;
            max-width: 480px;
            height: 92vh;
            background: var(--card);
            padding: 0;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(255, 116, 140, 0.2);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 登录页美化 */
        .auth-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
        .auth-logo {
            font-size: 42px;
            text-align: center;
            margin-bottom: 40px;
            color: var(--pink);
            text-shadow: 0 0 20px var(--pink);
            font-weight: bold;
            letter-spacing: 5px;
        }

        .input-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .input-box:focus { border-color: var(--pink); background: rgba(255,255,255,0.1); }

        .btn-prime {
            background: linear-gradient(90deg, var(--pink), #ff4d6d);
            border: none;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 116, 140, 0.4);
        }

        /* 游戏主体 UI */
        .header {
            padding: 20px;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .user-bar {
            padding: 10px 20px;
            background: #222;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--gold);
        }

        .nav-tabs {
            display: flex;
            background: #111;
            padding: 5px;
            justify-content: space-around;
        }
        .tab-item {
            padding: 10px;
            color: #777;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .tab-item.active { color: var(--pink); border-bottom: 2px solid var(--pink); }

        .main-content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .main-content.active { display: block; }

        /* 修炼特效 */
        .cultivate-zone {
            text-align: center;
            padding: 30px 0;
        }
        .meditate-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
            border: 2px solid var(--pink);
            color: white;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,116,140,0.7); } 70% { box-shadow: 0 0 0 20px rgba(255,116,140,0); } 100% { box-shadow: 0 0 0 0 rgba(255,116,140,0); } }

        /* 列表项 */
        .card-item {
            background: #252525;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .msg-line { margin-bottom: 8px; font-size: 14px; }
        .name-tag { color: var(--pink); font-weight: bold; margin-right: 5px; cursor: pointer; }
        .admin-label { background: var(--pink); color: black; font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-right: 5px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
    <!-- 认证屏 -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-logo">诸天万界</div>
        <div id="login-box">
            <input type="text" id="l-name" class="input-box" placeholder="道号">
            <input type="password" id="l-pw" class="input-box" placeholder="神魂密匙">
            <button class="btn-prime" style="width:100%" onclick="login()">契合神魂</button>
            <p style="text-align:center; color:#888; margin-top:20px; cursor:pointer;" onclick="toggleAuth(true)">未曾入世？在此降生</p>
        </div>
        <div id="reg-box" style="display:none">
            <input type="text" id="r-qq" class="input-box" placeholder="感应QQ">
            <input type="text" id="r-name" class="input-box" placeholder="起个道号">
            <input type="password" id="r-pw" class="input-box" placeholder="设置密匙">
            <button class="btn-prime" style="width:100%" onclick="register()">刻画神魂</button>
            <p style="text-align:center; color:#888; margin-top:20px; cursor:pointer;" onclick="toggleAuth(false)">已有神魂？点此归位</p>
        </div>
    </div>

    <!-- 游戏屏 -->
    <div id="game-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="header" id="header-title">诸天万界</div>
        <div class="user-bar" id="user-bar">
            <span>修为: 0 | 灵石: 0</span>
            <span>道侣: 无</span>
        </div>
        
        <div class="nav-tabs">
            <div class="tab-item active" onclick="switchTab('world')">诸天</div>
            <div class="tab-item" onclick="switchTab('cultivate')">修炼</div>
            <div class="tab-item" onclick="switchTab('shop')">百宝阁</div>
            <div class="tab-item" onclick="switchTab('social')">红尘</div>
        </div>

        <!-- 诸天大厅 -->
        <div id="tab-world" class="main-content active">
            <div id="world-msgs" style="height:350px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="world-input" class="input-box" style="margin:0;" placeholder="传音诸天...">
                <button class="btn-prime" style="width:80px; padding:0;" onclick="sendWorldMsg()">传音</button>
            </div>
        </div>

        <!-- 修炼区域 -->
        <div id="tab-cultivate" class="main-content">
            <div class="cultivate-zone">
                <button class="meditate-btn" onclick="meditate()">冥想修行</button>
                <p style="margin-top:20px; color:var(--gold)">点击凝聚天地灵气<br>(修为+5，灵石+2)</p>
            </div>
        </div>

        <!-- 百宝阁 -->
        <div id="tab-shop" class="main-content">
            <div class="card-item">
                <strong>聚灵丹</strong> <span style="color:var(--gold)">(100灵石)</span>
                <p style="font-size:12px; color:#888">服用后修为瞬间增加500点</p>
                <button class="btn-prime" style="padding:5px 10px; font-size:12px;" onclick="buyItem('dan')">购买</button>
            </div>
            <div class="card-item">
                <strong>道侣信物</strong> <span style="color:var(--gold)">(500灵石)</span>
                <p style="font-size:12px; color:#888">向心仪的道友发起双修申请</p>
                <button class="btn-prime" style="padding:5px 10px; font-size:12px;" onclick="buyItem('gift')">购买</button>
            </div>
        </div>

        <!-- 红尘（社交） -->
        <div id="tab-social" class="main-content">
            <div style="margin-bottom:20px;">
                <h4 style="color:var(--pink)">道友录</h4>
                <div id="player-list"></div>
            </div>
            <div id="friend-requests">
                <h4 style="color:var(--gold)">好友请求</h4>
                <div id="req-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);

    let me = null;

    function toggleAuth(isReg) {
        document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
        document.getElementById('reg-box').style.display = isReg ? 'block' : 'none';
    }

    async function register() {
        const qq = document.getElementById('r-qq').value;
        const name = document.getElementById('r-name').value;
        const pw = document.getElementById('r-pw').value;
        if(!qq || !name || !pw) return alert('神魂不全');
        const { error } = await _db.from('players').insert([{ qq, name, password: pw, level: 1, money: 100, exp: 0 }]);
        if(!error) { alert('降生成功'); toggleAuth(false); }
        else alert('降生失败');
    }

    async function login() {
        const name = document.getElementById('l-name').value;
        const pw = document.getElementById('l-pw').value;
        if(name === 'Ran' && pw === 'mr081104') {
            enterGame({ name: 'Ran', level: 999, money: 88888, exp: 99999, sect: '天道' });
            return;
        }
        const { data } = await _db.from('players').select('*').eq('name', name).eq('password', pw).single();
        if(data) enterGame(data);
        else alert('神魂不匹配');
    }

    function enterGame(player) {
        me = player;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        updateUI();
        loadWorldMsgs();
        
        // 实时传音
        _db.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => appendWorld(p.new)).subscribe();
    }

    function updateUI() {
        document.getElementById('header-title').innerText = "诸天 · " + me.name;
        document.getElementById('user-bar').innerHTML = `
            <span>修为: ${me.exp} | 灵石: ${me.money}</span>
            <span>道侣: ${me.partner || '孤苦伶仃'}</span>
        `;
    }

    function switchTab(tab) {
        document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
        if(tab === 'social') loadPlayers();
    }

    // 修炼逻辑
    async function meditate() {
        me.exp += 5;
        me.money += 2;
        updateUI();
        await _db.from('players').update({ exp: me.exp, money: me.money }).eq('name', me.name);
    }

    // 商店逻辑
    async function buyItem(type) {
        if(type === 'dan') {
            if(me.money < 100) return alert('灵石不足');
            me.money -= 100;
            me.exp += 500;
        } else if(type === 'gift') {
            if(me.money < 500) return alert('灵石不足');
            me.money -= 500;
            alert('信物已购，去红尘找道友双修吧');
        }
        updateUI();
        await _db.from('players').update({ exp: me.exp, money: me.money }).eq('name', me.name);
    }

    // 社交逻辑
    async function loadPlayers() {
        const { data } = await _db.from('players').select('name, exp, partner').limit(50);
        const box = document.getElementById('player-list');
        box.innerHTML = '';
        data.forEach(p => {
            if(p.name === me.name) return;
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <span class="name-tag">${p.name}</span> 
                <span style="font-size:12px; color:#666">修为: ${p.exp}</span>
                <div style="margin-top:5px; display:flex; gap:10px;">
                    <button class="btn-prime" style="padding:3px 8px; font-size:10px; background:#333;" onclick="addFriend('${p.name}')">加好友</button>
                    <button class="btn-prime" style="padding:3px 8px; font-size:10px; background:#443;" onclick="propose('${p.name}')">求结道侣</button>
                </div>
            `;
            box.appendChild(div);
        });
    }

    async function addFriend(target) {
        alert('已向 ' + target + ' 发起神识结交');
        await _db.from('friendships').insert([{ user_a: me.name, user_b: target }]);
    }

    async function propose(target) {
        alert('已向 ' + target + ' 发起双修契约，请静候回音');
        await _db.from('partner_proposals').insert([{ sender: me.name, receiver: target }]);
    }

    // 聊天逻辑
    async function loadWorldMsgs() {
        const { data } = await _db.from('messages').select('*').order('created_at', { ascending: false }).limit(30);
        const box = document.getElementById('world-msgs');
        box.innerHTML = '';
        if(data) data.reverse().forEach(m => appendWorld(m));
    }

    function appendWorld(m) {
        const box = document.getElementById('world-msgs');
        const div = document.createElement('div');
        div.className = 'msg-line';
        const tag = m.name === 'Ran' ? '<span class="admin-label">主宰</span>' : '';
        div.innerHTML = `${tag}<span class="name-tag">${m.name}</span>: ${m.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendWorldMsg() {
        const input = document.getElementById('world-input');
        const content = input.value.trim();
        if(!content) return;
        await _db.from('messages').insert([{ name: me.name, content }]);
        input.value = '';
    }
</script>
</body>
</html>
