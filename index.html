<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸天万界</title>
    <style>
        :root {
            --gold: #ffd700;
            --bg: #0a0a0a;
            --card: #151515;
            --pink: #ff748c;
            --text: #e0e0e0;
            --border: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px var(--pink);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            font-size: 20px;
            color: var(--pink);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            text-shadow: 0 0 5px var(--pink);
        }
        /* 导航栏 */
        .tabs {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            background: #222;
            border-radius: 5px;
            padding: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
        }
        .tab-btn.active {
            color: var(--pink);
            font-weight: bold;
        }

        /* 界面切换 */
        .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .panel.active { display: flex; }

        .input-group { margin-bottom: 10px; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: var(--pink);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .list-box {
            flex: 1;
            overflow-y: auto;
            background: #000;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .item {
            padding: 8px;
            border-bottom: 1px solid #222;
            font-size: 14px;
        }
        .item-name { color: var(--pink); font-weight: bold; }
        .item-meta { color: #666; font-size: 12px; }

        #admin-tag { background: var(--pink); color: black; font-size: 10px; padding: 1px 3px; border-radius: 3px; margin-right: 3px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
    <div class="header" id="main-title">诸天万界</div>

    <!-- 登录注册面板 -->
    <div id="auth-panel" class="panel active">
        <div id="login-form">
            <input type="text" id="l-name" placeholder="道号">
            <input type="password" id="l-pw" placeholder="密匙">
            <button onclick="login()">契合神魂</button>
            <p style="text-align:center; font-size:12px; color:#888;" onclick="toggleAuth(true)">初次降生？点此刻画神魂</p>
        </div>
        <div id="reg-form" style="display:none;">
            <input type="text" id="r-qq" placeholder="感应QQ">
            <input type="text" id="r-name" placeholder="起个道号">
            <input type="password" id="r-pw" placeholder="设置密匙">
            <button onclick="register()">刻画神魂</button>
            <p style="text-align:center; font-size:12px; color:#888;" onclick="toggleAuth(false)">已有神魂？点此归位</p>
        </div>
    </div>

    <!-- 核心游戏面板 -->
    <div id="game-panel" class="panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('world')">诸天</button>
            <button class="tab-btn" onclick="switchTab('private')">密语</button>
            <button class="tab-btn" onclick="switchTab('sect')">宗门</button>
            <button class="tab-btn" onclick="switchTab('friends')">道友</button>
        </div>

        <!-- 诸天大厅 -->
        <div id="tab-world" class="tab-content" style="display:flex; flex-direction:column; height:100%;">
            <div class="list-box" id="world-msgs"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="world-input" placeholder="传音诸天...">
                <button style="width:70px;" onclick="sendWorldMsg()">传音</button>
            </div>
        </div>

        <!-- 私人密语 -->
        <div id="tab-private" class="tab-content" style="display:none; flex-direction:column; height:100%;">
            <select id="msg-to" style="margin-bottom:5px;"></select>
            <div class="list-box" id="private-msgs"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="private-input" placeholder="神识传音...">
                <button style="width:70px;" onclick="sendPrivateMsg()">私传</button>
            </div>
        </div>

        <!-- 宗门系统 -->
        <div id="tab-sect" class="tab-content" style="display:none; flex-direction:column; height:100%;">
            <div id="sect-info" style="margin-bottom:10px; font-size:14px; color:var(--gold);"></div>
            <div class="list-box" id="sect-list"></div>
            <div id="sect-ops">
                <input type="text" id="sect-name" placeholder="宗门名称">
                <button onclick="createSect()">开宗立派</button>
            </div>
        </div>

        <!-- 道友录 -->
        <div id="tab-friends" class="tab-content" style="display:none; flex-direction:column; height:100%;">
            <div class="list-box" id="player-list"></div>
            <div style="font-size:12px; color:#666;">* 点击道友名称可发起私信</div>
            <button style="margin-top:10px; background:#444;" onclick="updatePasswordUI()">重刻神魂密匙</button>
            <button style="margin-top:10px; background:#222;" onclick="location.reload()">离线闭关</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let me = null;

    function toggleAuth(isReg) {
        document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
        document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
    }

    async function register() {
        const qq = document.getElementById('r-qq').value;
        const name = document.getElementById('r-name').value;
        const pw = document.getElementById('r-pw').value;
        if(!qq || !name || !pw) return alert('神魂不全');
        const { error } = await supabase.from('players').insert([{ qq, name, password: pw, level: 1, money: 100 }]);
        if(!error) { alert('降生成功'); toggleAuth(false); }
        else alert('降生失败：' + error.message);
    }

    async function login() {
        const name = document.getElementById('l-name').value;
        const pw = document.getElementById('l-pw').value;
        if(name === 'Ran' && pw === 'mr081104') {
            enterGame({ name: 'Ran', level: 999, money: 99999, sect: '天道' });
            return;
        }
        const { data } = await supabase.from('players').select('*').eq('name', name).eq('password', pw).single();
        if(data) enterGame(data);
        else alert('神魂不匹配');
    }

    function enterGame(player) {
        me = player;
        document.getElementById('auth-panel').classList.remove('active');
        document.getElementById('game-panel').classList.add('active');
        document.getElementById('main-title').innerText = "诸天 · " + me.name;
        
        loadWorldMsgs();
        loadSects();
        loadPlayers();
        
        // 实时监听
        supabase.channel('room1').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => appendWorld(p.new)).subscribe();
        supabase.channel('room2').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'private_messages' }, p => {
            if(p.new.receiver === me.name || p.new.sender === me.name) appendPrivate(p.new);
        }).subscribe();
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'flex';
        event.target.classList.add('active');
        if(tab === 'private') loadPrivateMsgs();
    }

    // --- 诸天逻辑 ---
    async function loadWorldMsgs() {
        const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(30);
        const box = document.getElementById('world-msgs');
        box.innerHTML = '';
        if(data) data.reverse().forEach(m => appendWorld(m));
    }

    function appendWorld(m) {
        const box = document.getElementById('world-msgs');
        const div = document.createElement('div');
        div.className = 'item';
        const tag = m.name === 'Ran' ? '<span id="admin-tag">主宰</span>' : '';
        div.innerHTML = `${tag}<span class="item-name">${m.name}</span>: ${m.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendWorldMsg() {
        const content = document.getElementById('world-input').value;
        if(!content) return;
        await supabase.from('messages').insert([{ name: me.name, content }]);
        document.getElementById('world-input').value = '';
    }

    // --- 私信逻辑 ---
    async function loadPrivateMsgs() {
        const { data } = await supabase.from('private_messages')
            .select('*')
            .or(`sender.eq.${me.name},receiver.eq.${me.name}`)
            .order('created_at', { ascending: true });
        const box = document.getElementById('private-msgs');
        box.innerHTML = '';
        if(data) data.forEach(m => appendPrivate(m));
    }

    function appendPrivate(m) {
        const box = document.getElementById('private-msgs');
        const div = document.createElement('div');
        div.className = 'item';
        const isMe = m.sender === me.name;
        div.innerHTML = `<span style="color:${isMe?'#888':var(--pink)}">[${isMe?'传予'+m.receiver:m.sender+'传音'}]</span>: ${m.content}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendPrivateMsg() {
        const to = document.getElementById('msg-to').value;
        const content = document.getElementById('private-input').value;
        if(!to || !content) return;
        await supabase.from('private_messages').insert([{ sender: me.name, receiver: to, content }]);
        document.getElementById('private-input').value = '';
    }

    // --- 宗门逻辑 ---
    async function loadSects() {
        const { data } = await supabase.from('sects').select('*');
        const box = document.getElementById('sect-list');
        box.innerHTML = '';
        if(data) data.forEach(s => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="item-name">${s.name}</span> <span class="item-meta">(宗主: ${s.leader})</span> 
                             <button style="width:50px; padding:2px; font-size:10px; float:right;" onclick="joinSect('${s.name}')">加入</button>`;
            box.appendChild(div);
        });
        document.getElementById('sect-info').innerText = me.sect ? `所属宗门：${me.sect}` : "散修一名";
    }

    async function createSect() {
        const name = document.getElementById('sect-name').value;
        if(!name) return;
        const { error } = await supabase.from('sects').insert([{ name, leader: me.name }]);
        if(!error) {
            await supabase.from('players').update({ sect: name }).eq('name', me.name);
            me.sect = name;
            loadSects();
        } else alert('创建失败，可能名号已被占用');
    }

    async function joinSect(sName) {
        const { error } = await supabase.from('players').update({ sect: sName }).eq('name', me.name);
        if(!error) { me.sect = sName; loadSects(); alert('已拜入' + sName); }
    }

    // --- 道友录 ---
    async function loadPlayers() {
        const { data } = await supabase.from('players').select('name, sect').limit(100);
        const box = document.getElementById('player-list');
        const sel = document.getElementById('msg-to');
        box.innerHTML = '';
        sel.innerHTML = '<option value="">选择传音对象...</option>';
        if(data) data.forEach(p => {
            if(p.name === me.name) return;
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span class="item-name" onclick="startPrivate('${p.name}')">${p.name}</span> <span class="item-meta">[${p.sect||'散修'}]</span>`;
            box.appendChild(div);
            sel.innerHTML += `<option value="${p.name}">${p.name}</option>`;
        });
    }

    function startPrivate(name) {
        document.getElementById('msg-to').value = name;
        switchTab('private');
    }

    async function updatePasswordUI() {
        const p = prompt("重刻神魂密匙：");
        if(p && p.length > 2) {
            await supabase.from('players').update({ password: p }).eq('name', me.name);
            alert('修改成功，请重新闭关');
            location.reload();
        }
    }
</script>
</body>
</html>
