<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ran的修仙宗门</title>
    <style>
        :root { --main-gold: #ffd700; --bg-dark: #121212; --card-bg: #1e1e1e; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: 'STKaiti', serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .stat-value { color: var(--main-gold); font-weight: bold; }
        .btn { background: #2c3e50; border: 1px solid var(--main-gold); color: var(--main-gold); padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-box { padding: 10px; border-radius: 5px; border: 1px solid var(--main-gold); background: #222; color: #fff; margin-bottom: 10px; width: 200px; text-align: center; }
        .log-box { height: 120px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.8rem; color: #888; text-align: left; border-radius: 5px; margin-top: 10px; border: 1px solid #333; }
        .admin-tag { background: var(--main-gold); color: #000; padding: 2px 6px; border-radius: 3px; font-size: 0.7rem; margin-left: 5px; }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="login-overlay">
    <h2 style="color:var(--main-gold)">请输入道号</h2>
    <input type="text" id="username-input" class="input-box" placeholder="你的修仙尊称">
    <button class="btn" onclick="login()">踏入仙途</button>
    <p style="font-size: 0.8rem; color: #666;">注：道号 'Ran' 为天道主宰</p>
</div>

<div class="container" id="main-ui" style="display:none">
    <div class="card">
        <div style="font-size:1.2rem; margin-bottom:10px;">
            <span id="display-name">修士</span>
            <span id="role-tag"></span>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; text-align:left;">
            <div>境界: <span id="level" class="stat-value">-</span></div>
            <div>灵石: <span id="money" class="stat-value">0</span></div>
            <div>今日余力: <span id="actions" class="stat-value">-</span></div>
            <div>战力: <span id="power" class="stat-value">-</span></div>
        </div>
    </div>

    <div class="card">
        <div style="color:var(--main-gold); margin-bottom:10px;">💎 修炼中心</div>
        <button class="btn" onclick="doAction('train')">打坐闭关</button>
        <button class="btn" onclick="doAction('explore')">秘境寻宝</button>
        <button class="btn" onclick="doAction('couple')">与陆执双修</button>
    </div>

    <!-- 转账功能 -->
    <div class="card">
        <div style="color:var(--main-gold); margin-bottom:10px;">📦 灵石传书 (转账)</div>
        <div style="font-size:0.8rem; color:#888; margin-bottom:10px;">生成一个礼包码发给道友，或输入别人的码</div>
        <input type="number" id="gift-amount" class="input-box" style="width:100px" placeholder="金额">
        <button class="btn" onclick="createGift()">打包灵石</button>
        <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
        <input type="text" id="gift-code-input" class="input-box" style="width:180px" placeholder="输入礼包码">
        <button class="btn" onclick="claimGift()">领取</button>
    </div>

    <div class="card">
        <div class="log-box" id="log"></div>
        <button class="btn" style="font-size:0.7rem; margin-top:10px; opacity:0.5;" onclick="resetData()">重修 (清空存档)</button>
    </div>
</div>

<script>
    let user = { name: "", money: 0, exp: 0, levelIdx: 0, actions: 20, lastDate: "", power: 10 };
    const levels = ["凡人", "炼气", "筑基", "金丹", "元婴", "化神", "渡劫", "大乘"];

    function login() {
        let name = document.getElementById('username-input').value.trim();
        if (!name) return alert("请赐教道号");
        user.name = name;
        loadData();
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('display-name').innerText = user.name;
        if(user.name === 'Ran') {
            document.getElementById('role-tag').innerHTML = '<span class="admin-tag">天道主宰</span>';
        }
        addLog(`欢迎回来，${user.name}。`);
        update();
    }

    function loadData() {
        let saved = localStorage.getItem('xiuxian_' + user.name);
        if (saved) {
            user = JSON.parse(saved);
        }
        // 每日刷新逻辑
        let today = new Date().toDateString();
        if (user.lastDate !== today) {
            user.actions = 20;
            user.lastDate = today;
        }
    }

    function saveData() {
        localStorage.setItem('xiuxian_' + user.name, JSON.stringify(user));
    }

    function update() {
        document.getElementById('level').innerText = levels[user.levelIdx] || "仙尊";
        document.getElementById('money').innerText = user.money;
        document.getElementById('power').innerText = user.power;
        document.getElementById('actions').innerText = (user.name === 'Ran') ? "无限" : user.actions;
        saveData();
    }

    function addLog(msg) {
        let log = document.getElementById('log');
        log.innerHTML = `> ${msg}<br>${log.innerHTML}`;
    }

    function doAction(type) {
        if (user.name !== 'Ran' && user.actions <= 0) {
            return addLog("<span style='color:red'>今日神识耗尽，请明日再来。</span>");
        }

        if (type === 'train') {
            user.exp += 10;
            addLog("深山苦修，修为微增。");
        } else if (type === 'explore') {
            let m = Math.floor(Math.random() * 20);
            user.money += m;
            addLog(`秘境探险，获得灵石 ${m}。`);
        } else if (type === 'couple') {
            user.exp += 50;
            addLog("与陆执灵肉合一，修为一日千里！");
        }

        if (user.name !== 'Ran') user.actions--;
        
        // 简易升级
        if (user.exp >= (user.levelIdx + 1) * 100) {
            user.levelIdx++;
            user.exp = 0;
            user.power += 100;
            addLog(`⭐ 恭喜突破至 ${levels[user.levelIdx]}！`);
        }
        update();
    }

    // 转账系统：生成礼包码
    function createGift() {
        let amt = parseInt(document.getElementById('gift-amount').value);
        if (isNaN(amt) || amt <= 0 || (user.name !== 'Ran' && amt > user.money)) {
            return alert("灵石不足或输入有误");
        }
        if (user.name !== 'Ran') user.money -= amt;
        // 生成一个简单的 base64 礼包码
        let code = btoa(`GIFT|${amt}|${Date.now()}|${Math.random()}`);
        addLog(`生成礼包码成功（扣除${amt}灵石）：<br><b style="color:var(--main-gold)">${code}</b><br>请复制发给道友。`);
        update();
    }

    // 转账系统：领取礼包码
    function claimGift() {
        let code = document.getElementById('gift-code-input').value.trim();
        try {
            let decoded = atob(code).split('|');
            if (decoded[0] === 'GIFT') {
                let amt = parseInt(decoded[1]);
                user.money += amt;
                addLog(`领取礼包成功，获得灵石 ${amt}！`);
                document.getElementById('gift-code-input').value = "";
                update();
            }
        } catch(e) {
            alert("无效的礼包码");
        }
    }

    function resetData() {
        if(confirm("确定要散尽修为重来吗？")) {
            localStorage.removeItem('xiuxian_' + user.name);
            location.reload();
        }
    }
</script>
</body>
</html>
