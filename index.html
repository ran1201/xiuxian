<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸天万界 · 始源极意卷</title>
    <style>
        /* 尊贵视觉系统 */
        :root { --gold: #d4af37; --gold-l: #f9e29f; --bg: #050505; --card: #111111; --text: #e0e0e0; --border: #3d341a; --red: #ff4d4d; --blue: #00a2ff; }
        * { box-sizing: border-box; font-family: 'STSong', serif; outline: none; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; background: var(--card); border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        /* 尊贵头部 */
        .u-header { padding: 20px 15px; background: linear-gradient(180deg, #000 0%, #111 100%); border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 15px; z-index: 100; }
        .u-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; box-shadow: 0 0 10px var(--gold); }
        .u-info-box { flex: 1; }
        .u-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .u-name-text { font-size: 18px; font-weight: bold; color: var(--gold-l); text-shadow: 0 0 5px var(--gold); }
        .u-badge { background: var(--gold); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .u-stats { font-size: 12px; color: #888; }

        /* 界面切换 */
        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; animation: fadeIn 0.4s; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 通用组件 */
        .gold-card { background: rgba(25,25,25,0.9); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .section-header { color: var(--gold); font-size: 15px; font-weight: bold; border-left: 4px solid var(--gold); padding-left: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { background: linear-gradient(135deg, #d4af37, #8a6d1d); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); }
        .btn-sub { background: #000; color: var(--gold); border: 1px solid var(--border); padding: 7px 15px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; }

        /* 聊天系统 */
        .chat-panel { flex: 1; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #080808; height: 380px; }
        .chat-nav { display: flex; border-bottom: 1px solid var(--border); }
        .chat-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; color: #444; cursor: pointer; }
        .chat-tab.active { color: var(--gold); background: #111; border-bottom: 2px solid var(--gold); font-weight: bold; }
        .msg-area { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; }
        .msg-line { margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .msg-user { color: var(--gold); font-weight: bold; margin-right: 8px; cursor: pointer; }

        /* 进度条 */
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #8a6d1d, #d4af37); transition: 0.6s; }

        /* 导航栏 */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 80px; background: #000; display: flex; border-top: 1px solid var(--border); box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #444; transition: 0.3s; }
        .nav-btn.active { color: var(--gold); font-weight: bold; }
        .nav-ico { font-size: 24px; margin-bottom: 4px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
    <!-- 1. 认证界面 (逻辑：注册需QQ，登录不需) -->
    <div id="p-auth" class="page active" style="justify-content:center; text-align:center;">
        <h1 style="color:var(--gold); font-size:36px; letter-spacing:8px; margin-bottom:5px;">诸天万界</h1>
        <p style="color:#555; font-size:12px; margin-bottom:30px;">—— 主宰 Ran 的意志永存 ——</p>
        <div class="gold-card">
            <input id="auth-name" placeholder="道号">
            <input id="auth-pw" type="password" placeholder="神识密钥">
            <div id="qq-input-group" style="display:none;">
                <input id="auth-qq" placeholder="绑定 QQ (注册唯一凭证)">
            </div>
            <button id="auth-btn-main" class="btn-main" style="width:100%" onclick="handleAuthAction()">归位入世</button>
            <div style="margin-top:20px; font-size:13px; color:var(--gold);">
                <span id="auth-toggle-txt" onclick="toggleAuthMode()" style="cursor:pointer; text-decoration:underline;">尚未降生？点击注册</span>
            </div>
        </div>
    </div>

    <!-- 2. 游戏主框架 -->
    <div id="game-main" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
        <div class="u-header">
            <img id="u-avatar" class="u-avatar" src="" onclick="triggerAvatar()">
            <input type="file" id="avatar-input" style="display:none" onchange="uploadAvatar()">
            <div class="u-info-box">
                <div class="u-name-row"><span id="u-name" class="u-name-text"></span><span id="u-title" class="u-badge"></span></div>
                <div class="u-stats">
                    灵石: <span id="u-money" style="color:var(--gold)">0</span> | 贡献: <span id="u-contrib" style="color:var(--blue)">0</span>
                </div>
            </div>
            <button class="btn-sub" onclick="doCheckin()">每日请安</button>
        </div>

        <!-- 洞府：修行/双修/任务 -->
        <div id="p-cave" class="page">
            <div class="gold-card" style="text-align:center;">
                <div id="u-realm" style="color:var(--gold); font-size:24px; font-weight:bold; margin-bottom:10px;"></div>
                <div class="bar-bg"><div id="exp-bar" class="bar-fill"></div></div>
                <div style="font-size:11px; color:#666;">修行进度: <span id="u-exp-txt"></span></div>
                <button class="btn-main" style="width:160px; height:160px; border-radius:50%; margin:25px 0; font-size:22px; box-shadow:0 0 30px var(--gold);" onclick="doPractice()">吸纳灵气</button>
                <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--gold-l);">
                    <span>今日灵气上限: <span id="u-daily-exp">0</span> / 2000</span>
                    <span id="u-companion">道侣: 无</span>
                </div>
            </div>
            <div class="gold-card"><div class="section-header">天道敕令</div><div id="task-list"></div></div>
        </div>

        <!-- 宗门：创立/全职位贡献/管理 -->
        <div id="p-sect" class="page">
            <div id="sect-none" style="display:none;">
                <div class="gold-card">
                    <div class="section-header">创立宗门</div>
                    <input id="new-sect-n" placeholder="宗门名 (需5000灵石)">
                    <button class="btn-main" style="width:100%" onclick="createSect()">开山立派</button>
                </div>
                <div class="gold-card"><div class="section-header">诸天宗门名录</div><div id="all-sects-list"></div></div>
            </div>
            <div id="sect-hall" style="display:none;">
                <div class="gold-card">
                    <div class="section-header"><span id="s-name" style="font-size:18px;"></span><button class="btn-sub" onclick="quitSect()">叛出宗门</button></div>
                    <div style="font-size:14px;">职级: <span id="s-pos" style="color:var(--gold)"></span></div>
                </div>
                <div class="gold-card">
                    <div class="section-header">宗门宝阁 (贡献兑换)</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button class="btn-sub" onclick="buySectItem('money')">支取1k灵石(1k贡献)</button>
                        <button class="btn-sub" onclick="buySectItem('title')">申请宗门封号(2k贡献)</button>
                    </div>
                </div>
                <div id="sect-admin-box" class="gold-card" style="display:none; border-color:var(--gold);">
                    <div class="section-header">宗主大权</div>
                    <input id="prom-target" placeholder="弟子名">
                    <button class="btn-main" style="width:100%" onclick="promoteDisciple()">晋升职位</button>
                </div>
                <div class="gold-card"><div class="section-header">同门师兄弟</div><div id="sect-members"></div></div>
            </div>
        </div>

        <!-- 诸天：聊天/百宝阁/排行 -->
        <div id="p-world" class="page">
            <div class="chat-panel">
                <div class="chat-nav">
                    <div id="tab-w" class="chat-tab active" onclick="switchChat('WORLD')">世界大厅</div>
                    <div id="tab-p" class="chat-tab" onclick="switchChat('PRIVATE')">神识私传</div>
                </div>
                <div id="msg-list" class="msg-area"></div>
                <div style="display:flex; padding:10px; gap:8px; background:#000;">
                    <input id="chat-input" style="margin:0; flex:1;" placeholder="传音内容...">
                    <button class="btn-main" style="padding:0 20px;" onclick="sendMsg()">传</button>
                </div>
            </div>
            <div class="gold-card" style="margin-top:15px;">
                <div class="section-header">诸天百宝阁 · 稀世珍宝</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-sub" onclick="buyShop('rename', 10000)">易名金册(1w)</button>
                    <button class="btn-sub" onclick="buyShop('title', 5000)">帝号残卷(5k)</button>
                    <button class="btn-sub" onclick="buyShop('artifact_1', 50000)">乾坤鼎(5w)</button>
                    <button class="btn-sub" onclick="buyShop('artifact_2', 30000)">幽冥珠(3w)</button>
                    <button class="btn-sub" onclick="buyShop('artifact_3', 20000)">龙凤玉佩(2w)</button>
                    <button class="btn-sub" onclick="buyShop('artifact_4', 15000)">九阳炉(1.5w)</button>
                </div>
            </div>
            <div class="gold-card"><div class="section-header">诸天战力榜 (天道隐匿)</div><div id="rank-list"></div></div>
        </div>

        <!-- 主宰：Ran 专用控制台 -->
        <div id="p-admin" class="page">
            <div class="gold-card" style="border:1px solid var(--red);">
                <div class="section-header" style="color:var(--red);">天道造物 (绕过注册)</div>
                <input id="adm-new-n" placeholder="新修士道号">
                <input id="adm-new-p" placeholder="神识密钥">
                <button class="btn-main" style="width:100%; background:var(--red);" onclick="adminCreate()">创造灵魂</button>
            </div>
            <div class="gold-card" style="border:1px solid var(--red);">
                <div class="section-header">至高奖惩</div>
                <input id="adm-target" placeholder="目标道号 (发全服留空)">
                <input id="adm-amount" type="number" placeholder="灵石数额">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <button class="btn-main" style="flex:1" onclick="adminReward('single')">赐予</button>
                    <button class="btn-main" style="flex:1; background:var(--red);" onclick="adminReward('all')">全服普降</button>
                </div>
                <button class="btn-sub" style="width:100%; border-color:var(--red); color:var(--red);" onclick="adminAction('ban')">封印其神魂</button>
            </div>
            <div class="gold-card" style="border:1px solid var(--red);">
                <div class="section-header">颁布敕令</div>
                <input id="adm-task" placeholder="任务内容...">
                <button class="btn-main" style="width:100%" onclick="adminPostTask()">敕令颁布</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-btn active" onclick="navTo('cave')"><span class="nav-ico">🧘</span>洞府</div>
            <div class="nav-btn" onclick="navTo('sect')"><span class="nav-ico">⛩️</span>宗门</div>
            <div class="nav-btn" onclick="navTo('world')"><span class="nav-ico">🌍</span>诸天</div>
            <div id="nav-adm" class="nav-btn" style="display:none; color:var(--red);" onclick="navTo('admin')"><span class="nav-ico">⚖️</span>主宰</div>
        </nav>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);
    
    let me = null, isRegMode = false, chatMode = 'WORLD';
    const REALMS = ["炼气", "筑基", "金丹", "元婴", "化神", "合体", "渡劫", "大乘", "人仙", "地仙", "天仙", "金仙", "大罗金仙", "准圣", "圣人", "天道主宰"];

    // --- 认证系统：注册需QQ，登录仅需名号/密钥 ---
    function toggleAuthMode() {
        isRegMode = !isRegMode;
        document.getElementById('qq-input-group').style.display = isRegMode ? 'block' : 'none';
        document.getElementById('auth-btn-main').innerText = isRegMode ? '降生注册' : '归位入世';
        document.getElementById('auth-toggle-txt').innerText = isRegMode ? '已有神魂？点击登录' : '尚未降生？点击注册';
    }

    async function handleAuthAction() {
        const n = document.getElementById('auth-name').value.trim();
        const p = document.getElementById('auth-pw').value.trim();
        const q = document.getElementById('auth-qq').value.trim();

        if (isRegMode) {
            if (!n || !p || !q) return alert("注册需道号、密钥及QQ");
            // 校验 QQ 唯一性
            const {data:qqExist} = await _db.from('players').select('id').eq('qq_number', q);
            if(qqExist && qqExist.length > 0) return alert("该 QQ 已绑定神魂");
            const {error} = await _db.from('players').insert([{name:n, password:p, qq_number:q}]);
            if(error) return alert("道号已被占用");
            alert("降生成功！"); toggleAuthMode();
        } else {
            const {data, error} = await _db.from('players').select('*').eq('name', n).eq('password', p).single();
            if(!data) return alert("身份校验失败");
            if(data.is_banned) return alert("神魂已被封印");
            me = data; enterWorld();
        }
    }

    function enterWorld() {
        document.getElementById('p-auth').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        if(me.is_admin) document.getElementById('nav-adm').style.display = 'flex';
        refreshUI(); startRealtime();
    }

    // --- 核心刷新逻辑 ---
    async function refreshUI() {
        document.getElementById('u-name').innerText = me.name;
        document.getElementById('u-title').innerText = me.title;
        document.getElementById('u-money').innerText = me.money;
        document.getElementById('u-contrib').innerText = me.contribution;
        document.getElementById('u-avatar').src = me.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed='+me.name;
        
        const ri = Math.min(Math.floor(me.exp/5000), 15);
        document.getElementById('u-realm').innerText = REALMS[ri];
        document.getElementById('exp-bar').style.width = ((me.exp % 5000)/5000)*100 + '%';
        document.getElementById('u-exp-txt').innerText = `${me.exp} / ${(ri+1)*5000}`;
        document.getElementById('u-daily-exp').innerText = me.daily_exp_count || 0;
        document.getElementById('u-companion').innerText = "道侣: " + (me.companion_name || "无");
        
        loadSectInfo(); loadTasks(); loadRank(); loadMsgs();
    }

    // --- 修行：上限2000，双修翻倍，全职位贡献 ---
    async function doPractice() {
        const today = new Date().toISOString().split('T')[0];
        if (me.daily_exp_count >= 2000 && me.last_practice_date === today) return alert("今日灵气已满，强修有害");
        
        let addExp = me.companion_name ? 200 : 100;
        let addCon = me.sect ? 10 : 0; // 只要有宗门，全职位都加贡献
        
        const {data} = await _db.from('players').update({
            exp: me.exp + addExp,
            daily_exp_count: (me.last_practice_date === today ? me.daily_exp_count : 0) + addExp,
            contribution: me.contribution + addCon,
            last_practice_date: today
        }).eq('id', me.id).select().single();
        me = data; refreshUI();
    }

    // --- 宗门系统 ---
    async function loadSectInfo() {
        if (!me.sect) {
            document.getElementById('sect-none').style.display = 'block';
            document.getElementById('sect-hall').style.display = 'none';
            const {data} = await _db.from('sects').select('*');
            document.getElementById('all-sects-list').innerHTML = data.map(s=>`
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                    <span>${s.name} (宗主: ${s.master_name})</span>
                    <button class="btn-sub" onclick="joinSect('${s.name}')">加入</button>
                </div>
            `).join('');
        } else {
            document.getElementById('sect-none').style.display = 'none';
            document.getElementById('sect-hall').style.display = 'block';
            document.getElementById('s-name').innerText = me.sect;
            const ps = ["杂役", "外门", "内门", "亲传", "长老", "宗主"];
            document.getElementById('s-pos').innerText = ps[me.sect_pos_level];
            if(me.sect_pos_level >= 5) document.getElementById('sect-admin-box').style.display='block';
            
            const {data:members} = await _db.from('players').select('name, sect_pos_level').eq('sect', me.sect).order('sect_pos_level', {ascending:false});
            document.getElementById('sect-members').innerHTML = members.map(m=>`
                <div style="font-size:12px; padding:5px 0; border-bottom:1px solid #1a1a1a;">[${ps[m.sect_pos_level]}] ${m.name}</div>
            `).join('');
        }
    }

    async function createSect() {
        const n = document.getElementById('new-sect-n').value.trim();
        if(me.money < 5000) return alert("灵石不足");
        await _db.from('sects').insert([{name:n, master_name:me.name}]);
        const {data} = await _db.from('players').update({sect:n, sect_pos_level:5, money:me.money-5000}).eq('id', me.id).select().single();
        me = data; refreshUI();
    }

    async function joinSect(sn) {
        const {data} = await _db.from('players').update({sect:sn, sect_pos_level:0}).eq('id', me.id).select().single();
        me = data; refreshUI();
    }

    async function quitSect() {
        if(!confirm("脱离宗门将失去所有职位，确定？")) return;
        const {data} = await _db.from('players').update({sect:null, sect_pos_level:0}).eq('id', me.id).select().single();
        me = data; refreshUI();
    }

    // --- 聊天系统 ---
    function switchChat(m) {
        chatMode = m;
        document.getElementById('tab-w').classList.toggle('active', m==='WORLD');
        document.getElementById('tab-p').classList.toggle('active', m==='PRIVATE');
        loadMsgs();
    }

    async function sendMsg() {
        const c = document.getElementById('chat-input').value.trim();
        let rev = 'WORLD';
        if(chatMode === 'PRIVATE') {
            rev = prompt("请输入对方道号"); if(!rev) return;
        }
        if(!c) return;
        await _db.from('messages').insert([{sender_name: me.name, receiver_name: rev, content: c}]);
        document.getElementById('chat-input').value = '';
    }

    async function loadMsgs() {
        let q = _db.from('messages').select('*').order('created_at', {ascending:false}).limit(20);
        if(chatMode === 'WORLD') q = q.eq('receiver_name', 'WORLD');
        else q = q.or(`sender_name.eq.${me.name},receiver_name.eq.${me.name}`).neq('receiver_name', 'WORLD');
        const {data} = await q;
        document.getElementById('msg-list').innerHTML = data.reverse().map(m=>`
            <div class="msg-line"><span class="msg-user" onclick="setPrivTarget('${m.sender_name}')">${m.sender_name}${m.receiver_name!=='WORLD'?' → '+m.receiver_name:''}:</span><span>${m.content}</span></div>
        `).join('');
    }

    // --- 百宝阁：神器系统 ---
    async function buyShop(type, cost) {
        if(me.money < cost) return alert("灵石不足");
        let updateData = { money: me.money - cost };
        if(type === 'rename') {
            const nn = prompt("请输入新道号"); if(!nn) return;
            updateData.name = nn;
        } else if(type === 'title') {
            const nt = prompt("请输入至尊封号"); if(!nt) return;
            updateData.title = nt;
        } else {
            const arts = {artifact_1: "【乾坤鼎】", artifact_2: "【幽冥珠】", artifact_3: "【龙凤玉佩】", artifact_4: "【九阳炉】"};
            updateData.title = arts[type];
        }
        const {data, error} = await _db.from('players').update(updateData).eq('id', me.id).select().single();
        if(error) return alert("操作失败");
        me = data; refreshUI(); alert("宝物已归位");
    }

    // --- 主宰面板 (Ran 专用) ---
    async function adminCreate() {
        const n = document.getElementById('adm-new-n').value;
        const p = document.getElementById('adm-new-p').value;
        await _db.from('players').insert([{name:n, password:p, qq_number:'ADM_BYPASS_'+Date.now()}]);
        alert("灵魂已点化入世");
    }

    async function adminReward(type) {
        const amt = parseInt(document.getElementById('adm-amount').value);
        const t = document.getElementById('adm-target').value;
        if(type==='all') {
            const {data:all} = await _db.from('players').select('id, money');
            for(let p of all) await _db.from('players').update({money: p.money + amt}).eq('id', p.id);
            alert("普降雨露完成");
        } else {
            const {data:target} = await _db.from('players').select('money').eq('name', t).single();
            await _db.from('players').update({money: target.money + amt}).eq('name', t);
            alert("天道赐予完成");
        }
    }

    async function adminAction(type) {
        const t = document.getElementById('adm-target').value;
        if(type==='ban') await _db.from('players').update({is_banned:true}).eq('name', t);
        alert("天道裁决下达");
    }

    async function adminPostTask() {
        const c = document.getElementById('adm-task').value;
        await _db.from('heaven_tasks').insert([{content: c}]);
        alert("敕令颁布"); loadTasks();
    }

    // --- 杂项 ---
    function navTo(p) {
        document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
        document.getElementById('p-'+p).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    async function doCheckin() {
        const td = new Date().toISOString().split('T')[0];
        if(me.last_checkin === td) return alert("今日已签到");
        const {data} = await _db.from('players').update({money: me.money+500, last_checkin:td}).eq('id',me.id).select().single();
        me = data; refreshUI(); alert("天道恩赐500灵石");
    }

    async function loadRank() {
        const {data} = await _db.from('players').select('name, exp').neq('name', 'Ran').order('exp', {ascending:false}).limit(10);
        document.getElementById('rank-list').innerHTML = data.map((r,i)=>`<div style="padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between;"><span>#${i+1} ${r.name}</span><span style="color:var(--gold)">${r.exp}修为</span></div>`).join('');
    }

    async function loadTasks() {
        const {data} = await _db.from('heaven_tasks').select('*');
        document.getElementById('task-list').innerHTML = data.map(t=>`<div style="margin-bottom:10px; display:flex; justify-content:space-between;"><span>${t.content}</span><button class="btn-sub" onclick="alert('任务完成，灵气入体')">领赏</button></div>`).join('');
    }

    function startRealtime() {
        _db.channel('changes').on('postgres_changes',{event:'*', schema:'public'},()=>{loadMsgs(); loadRank();}).subscribe();
    }
</script>
</body>
</html>
