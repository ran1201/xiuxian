<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸天万界 · 创世</title>
    <style>
        :root {
            --gold: #d4af37; --gold-l: #f9e29f; --bg: #050505; --card: #121212;
            --text: #e0e0e0; --border: #3d341a;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'STSong', serif; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }

        /* 顶部状态 */
        .u-header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 12px; }
        .u-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        
        /* 导航栏 */
        .nav-bottom { display: flex; background: #000; border-top: 1px solid var(--border); position: absolute; bottom: 0; width: 100%; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 12px; cursor: pointer; color: #555; }
        .nav-item.active { color: var(--gold); font-weight: bold; background: rgba(212,175,55,0.1); }

        /* 页面容器 */
        .page { display: none; flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; flex-direction: column; }
        .page.active { display: flex; }

        /* 模块样式 */
        .gold-card { background: #1a1a1a; border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #8a6d1d); color: #000; font-weight: bold; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid var(--border); padding: 8px; border-radius: 5px; font-size: 12px; }
        
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        /* 修炼特效 */
        #cultivate-zone { text-align: center; padding: 40px 0; }
        .aura-circle { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); } 70% { box-shadow: 0 0 0 20px rgba(212,175,55,0); } 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); } }

        /* 商店网格 */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
    <!-- 登录屏 -->
    <div id="auth-page" class="page active" style="justify-content:center; text-align:center;">
        <h1 style="color:var(--gold); letter-spacing:10px;">诸天万界</h1>
        <div class="gold-card">
            <input type="text" id="l-name" placeholder="道号">
            <input type="password" id="l-pw" placeholder="神魂密匙">
            <button class="btn-gold" onclick="login()">契合神魂</button>
            <p style="font-size:12px; color:#555; margin-top:15px; cursor:pointer;" onclick="showReg()">初入此界？点击降生</p>
        </div>
    </div>

    <!-- 注册屏 -->
    <div id="reg-page" class="page" style="justify-content:center; text-align:center;">
        <h2 style="color:var(--gold);">降生诸天</h2>
        <div class="gold-card">
            <input type="text" id="r-name" placeholder="唯一道号">
            <input type="password" id="r-pw" placeholder="设置密匙">
            <input type="text" id="r-title" placeholder="自选唯一封号 (如: 无极)">
            <button class="btn-gold" onclick="register()">开启新人生</button>
            <p style="font-size:12px; color:#555; margin-top:15px; cursor:pointer;" onclick="showLogin()">已有神魂</p>
        </div>
    </div>

    <!-- 主界面内容 -->
    <div id="main-content" style="display:none; flex:1; flex-direction:column; position:relative;">
        <div class="u-header">
            <img id="u-avatar" class="u-avatar" src="" onclick="triggerAvatar()">
            <input type="file" id="avatar-input" hidden onchange="doAvatarUpload()">
            <div style="flex:1">
                <div id="u-show-title" style="font-size:11px; color:var(--gold-l)"></div>
                <div id="u-show-name" style="font-size:16px; font-weight:bold;"></div>
            </div>
            <div style="text-align:right">
                <div style="font-size:12px; color:var(--gold)">灵石: <span id="u-money">0</span></div>
                <div id="u-realm" style="font-size:10px; opacity:0.6"></div>
            </div>
        </div>

        <!-- 1. 修炼页面 -->
        <div id="p-cave" class="page">
            <div id="cultivate-zone">
                <div class="aura-circle" onclick="doCultivate()">
                    <span style="color:var(--gold); font-weight:bold;">吸纳灵气</span>
                </div>
                <p style="margin-top:20px; font-size:14px;">当前修为进度: <span id="u-exp-val">0</span></p>
                <div style="font-size:12px; color:#666;">点击法阵，感悟天地造化</div>
            </div>
            <div class="gold-card">
                <h4>道号修改</h4>
                <p style="font-size:11px; color:#888;">需持有「易名金章」x1</p>
                <input id="new-title-input" placeholder="输入新封号">
                <button class="btn-dark" onclick="changeTitle()">更改封号</button>
            </div>
        </div>

        <!-- 2. 宗门页面 -->
        <div id="p-sect" class="page">
            <div id="sect-content"></div>
        </div>

        <!-- 3. 商店页面 -->
        <div id="p-shop" class="page">
            <h3 style="color:var(--gold)">诸天宝阁</h3>
            <div class="shop-grid">
                <div class="gold-card" style="text-align:center;">
                    <b>易名金章</b>
                    <p style="color:var(--gold)">1000灵石</p>
                    <button class="btn-gold" style="font-size:11px;" onclick="buyItem('card', 1000)">购买</button>
                </div>
                <div class="gold-card" style="text-align:center;">
                    <b>传音敕令</b>
                    <p style="color:var(--gold)">500灵石</p>
                    <button class="btn-gold" style="font-size:11px;" onclick="buyItem('trumpet', 500)">购买</button>
                </div>
            </div>
            <div class="gold-card" style="margin-top:10px;">
                <p>我的背囊：</p>
                <small>易名金章: <b id="inv-card">0</b> | 传音敕令: <b id="inv-tp">0</b></small>
            </div>
        </div>

        <!-- 4. 社交页面 (好友/群聊) -->
        <div id="p-social" class="page">
            <div class="gold-card">
                <input id="search-u" placeholder="搜索道友...">
                <button class="btn-gold" onclick="addFriend()">发送神识申请</button>
            </div>
            <div id="chat-list"></div>
        </div>

        <!-- 5. 主宰页面 (Ran 专属) -->
        <div id="p-admin" class="page">
            <h2 style="color:red;">主宰敕令</h2>
            <div class="gold-card">
                <h4>创生灵魂 (创建账号)</h4>
                <input id="adm-n" placeholder="新修士道号">
                <input id="adm-p" placeholder="初始密匙">
                <input id="adm-t" placeholder="初始封号">
                <button class="btn-gold" onclick="adminCreate()">降生该修士</button>
            </div>
            <div class="gold-card">
                <h4>抹除宗门</h4>
                <input id="adm-sect" placeholder="输入宗门全名">
                <button class="btn-red" style="width:100%; padding:10px; background:#400; color:red; border:1px solid red;" onclick="adminDelSect()">彻底摧毁宗门</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="nav-bottom">
            <div class="nav-item active" onclick="navTo('cave')">洞府</div>
            <div class="nav-item" onclick="navTo('sect')">宗门</div>
            <div class="nav-item" onclick="navTo('shop')">宝阁</div>
            <div class="nav-item" onclick="navTo('social')">传神</div>
            <div id="nav-admin" class="nav-item" style="display:none; color:red;" onclick="navTo('admin')">主宰</div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);

    let me = null;
    const REALMS = ["凡人","练气","筑基","金丹","元婴","化神","合体","大乘","渡劫","人仙","地仙","天仙","金仙","大罗","准圣","圣人","诸天至尊"];

    function showReg() { navPage('reg-page'); }
    function showLogin() { navPage('auth-page'); }
    function navPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function login() {
        const n = document.getElementById('l-name').value.trim();
        const p = document.getElementById('l-pw').value.trim();
        if(n === 'Ran' && p === 'mr081104') {
            enterGame({ id:0, name:'Ran', title:'无极天尊', exp:999999, money:999999, avatar_url:'https://api.dicebear.com/7.x/bottts/svg?seed=Ran', title_cards:99, trumpets:99 });
            return;
        }
        const { data } = await _db.from('players').select('*').eq('name',n).eq('password',p).single();
        if(data) {
            if(data.is_banned) return alert('你已被主宰抹除');
            enterGame(data);
        } else alert('神魂不契合');
    }

    async function register() {
        const n = document.getElementById('r-name').value.trim();
        const p = document.getElementById('r-pw').value.trim();
        const t = document.getElementById('r-title').value.trim();
        const { error } = await _db.from('players').insert([{ name:n, password:p, title:t, money:500 }]);
        if(error) alert('道号或封号已被占用'); else { alert('降生成功'); showLogin(); }
    }

    function enterGame(p) {
        me = p;
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('reg-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';
        if(me.name === 'Ran') document.getElementById('nav-admin').style.display = 'block';
        refreshUI();
        navTo('cave');
    }

    function refreshUI() {
        const lv = Math.floor((me.exp||0)/1000);
        document.getElementById('u-realm').innerText = REALMS[lv] || "至高";
        document.getElementById('u-show-title').innerText = "「" + me.title + "」";
        document.getElementById('u-show-name').innerText = me.name;
        document.getElementById('u-money').innerText = me.money;
        document.getElementById('u-exp-val').innerText = me.exp || 0;
        document.getElementById('inv-card').innerText = me.title_cards || 0;
        document.getElementById('inv-tp').innerText = me.trumpets || 0;
        document.getElementById('u-avatar').src = me.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed='+me.name;
        renderSect();
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function triggerAvatar() { document.getElementById('avatar-input').click(); }
    function doAvatarUpload() {
        const file = document.getElementById('avatar-input').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            me.avatar_url = e.target.result;
            refreshUI();
            await _db.from('players').update({ avatar_url: me.avatar_url }).eq('id', me.id);
        };
        reader.readAsDataURL(file);
    }

    async function doCultivate() {
        me.exp = (me.exp||0) + 20; me.money += 5;
        refreshUI();
        await _db.from('players').update({ exp: me.exp, money: me.money }).eq('id', me.id);
    }

    async function buyItem(type, price) {
        if(me.money < price) return alert('灵石不足');
        me.money -= price;
        if(type === 'card') me.title_cards = (me.title_cards||0)+1;
        else me.trumpets = (me.trumpets||0)+1;
        refreshUI();
        await _db.from('players').update({ money: me.money, title_cards: me.title_cards, trumpets: me.trumpets }).eq('id', me.id);
        alert('已存入背囊');
    }

    async function changeTitle() {
        const nt = document.getElementById('new-title-input').value.trim();
        if(!me.title_cards || me.title_cards <= 0) return alert('缺少易名金章');
        const { error } = await _db.from('players').update({ title: nt, title_cards: me.title_cards - 1 }).eq('id', me.id);
        if(error) return alert('此封号已被他人夺走');
        me.title = nt; me.title_cards--;
        refreshUI();
        alert('封号已更新');
    }

    /* 宗门逻辑 */
    async function renderSect() {
        const box = document.getElementById('sect-content');
        if(!me.sect) {
            box.innerHTML = `<div class="gold-card"><input id="s-n" placeholder="宗门名号"><button class="btn-gold" onclick="createSect()">建立宗门</button></div>`;
            const { data } = await _db.from('sects').select('*');
            data?.forEach(s => {
                box.innerHTML += `<div class="gold-card" style="display:flex; justify-content:space-between;"><span>${s.name}</span><button class="btn-dark" onclick="joinSect('${s.name}')">加入</button></div>`;
            });
        } else {
            box.innerHTML = `<div class="gold-card"><h2>${me.sect}</h2><p>身份: ${me.sect_role}</p>
            <button class="btn-dark" onclick="quitSect()">退出宗门</button></div>`;
        }
    }

    async function createSect() {
        const n = document.getElementById('s-n').value.trim();
        await _db.from('sects').insert([{ name:n, leader:me.name }]);
        me.sect = n; me.sect_role = '宗主';
        await _db.from('players').update({ sect:n, sect_role:'宗主' }).eq('id', me.id);
        refreshUI();
    }

    /* 主宰特权 */
    async function adminCreate() {
        const n = document.getElementById('adm-n').value.trim();
        const p = document.getElementById('adm-p').value.trim();
        const t = document.getElementById('adm-t').value.trim();
        await _db.from('players').insert([{ name:n, password:p, title:t, money:500 }]);
        alert('已创造新的灵魂：'+n);
    }

    async function adminDelSect() {
        const sn = document.getElementById('adm-sect').value.trim();
        if(!confirm('确定抹除宗门 '+sn+' ?')) return;
        await _db.from('sects').delete().eq('name', sn);
        await _db.from('players').update({ sect: null, sect_role: null }).eq('sect', sn);
        alert('宗门 '+sn+' 已化为齑粉');
    }
</script>
</body>
</html>
