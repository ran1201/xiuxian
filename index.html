<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸天万界 · 连理</title>
    <style>
        :root {
            --gold: #d4af37; --gold-l: #f9e29f; --bg: #050505; --card: #151515;
            --text: #e0e0e0; --border: #3d341a;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'serif'; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100vh; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }

        /* 顶部状态 */
        .u-header { padding: 15px; background: #000; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 10px; }
        .u-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        
        /* 导航 */
        .nav-bottom { display: flex; background: #000; border-top: 1px solid var(--border); position: absolute; bottom: 0; width: 100%; z-index: 10; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; font-size: 11px; cursor: pointer; color: #555; }
        .nav-item.active { color: var(--gold); font-weight: bold; background: rgba(212,175,55,0.1); }

        /* 页面 */
        .page { display: none; flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; flex-direction: column; }
        .page.active { display: flex; }

        .gold-card { background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #8a6d1d); color: #000; font-weight: bold; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-dark { background: #222; color: var(--gold); border: 1px solid var(--border); padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 8px; box-sizing: border-box; font-size: 13px; }

        /* 聊天逻辑 */
        #chat-box { flex: 1; overflow-y: auto; background: #000; border-radius: 8px; padding: 10px; margin-bottom: 10px; border: 1px solid #222; }
        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg b { color: var(--gold); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
    <!-- 登录注册略，保持原有逻辑 -->
    <div id="auth-zone" style="padding:40px; text-align:center;">
        <h1 style="color:var(--gold)">诸天万界</h1>
        <input id="l-name" placeholder="道号">
        <input id="l-pw" type="password" placeholder="密匙">
        <button class="btn-gold" onclick="login()">归位</button>
        <button class="btn-dark" style="margin-top:20px;" onclick="register()">降生(需填好上框)</button>
    </div>

    <!-- 游戏主区 -->
    <div id="game-zone" style="display:none; flex:1; flex-direction:column;">
        <div class="u-header">
            <img id="u-avatar" class="u-avatar" src="" onclick="uploadAvatar()">
            <div style="flex:1">
                <div id="u-show-title" style="font-size:10px; color:var(--gold-l)"></div>
                <div id="u-show-name" style="font-size:14px; font-weight:bold;"></div>
            </div>
            <div style="text-align:right; font-size:11px;">
                <div>灵石: <span id="u-money" style="color:var(--gold)">0</span></div>
                <div id="u-realm"></div>
            </div>
        </div>

        <!-- 1. 诸天大厅 (Global Chat) -->
        <div id="p-hall" class="page active">
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input id="chat-in" placeholder="传音诸天..." style="margin:0;">
                <button class="btn-gold" style="width:70px; margin:0;" onclick="sendGlobal()">传音</button>
            </div>
        </div>

        <!-- 2. 洞府 (修炼/道侣/转账) -->
        <div id="p-cave" class="page">
            <div class="gold-card" style="text-align:center;">
                <div id="u-partner" style="color:var(--gold); margin-bottom:10px;">道侣: 孤身一人</div>
                <button class="btn-gold" onclick="cultivate()">单人冥想 (+20)</button>
                <button id="btn-double" class="btn-gold" style="background:linear-gradient(135deg, #ffcf33, #ff9900); display:none;" onclick="doubleCultivate()">道侣双修 (+50)</button>
            </div>

            <div class="gold-card">
                <h4>灵石转账</h4>
                <input id="trans-to" placeholder="接收者道号">
                <input id="trans-amt" type="number" placeholder="灵石数量">
                <button class="btn-dark" onclick="transferMoney()">确认划拨</button>
            </div>

            <div class="gold-card">
                <h4>寻找道侣</h4>
                <input id="mate-name" placeholder="道友道号">
                <button class="btn-gold" onclick="sendMateReq()">发起契约</button>
                <div id="mate-req-box" style="margin-top:10px; font-size:12px;"></div>
            </div>
        </div>

        <!-- 3. 宗门 (进阶体系) -->
        <div id="p-sect" class="page">
            <div id="sect-info"></div>
            <div id="sect-member-list" class="gold-card" style="display:none;">
                <h4>宗门成员</h4>
                <div id="member-box"></div>
            </div>
        </div>

        <!-- 4. 私传 (Private Message) -->
        <div id="p-pm" class="page">
            <input id="pm-target" placeholder="对方道号">
            <div id="pm-box" style="flex:1; background:#000; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #222;"></div>
            <div style="display:flex; gap:5px;">
                <input id="pm-in" placeholder="神识密语..." style="margin:0;">
                <button class="btn-gold" style="width:70px; margin:0;" onclick="sendPM()">私传</button>
            </div>
        </div>

        <!-- 5. 主宰 (Ran 专属) -->
        <div id="p-admin" class="page">
            <h3 style="color:red">天道权限</h3>
            <div class="gold-card">
                <input id="adm-un" placeholder="新道号">
                <input id="adm-pw" placeholder="新密匙">
                <button class="btn-gold" onclick="adminCreate()">创造灵魂</button>
            </div>
            <div class="gold-card">
                <input id="adm-sn" placeholder="宗门名字">
                <button class="btn-red" style="width:100%; color:red; background:#200; border:1px solid red; padding:10px;" onclick="adminDelSect()">抹除宗门</button>
            </div>
        </div>

        <div class="nav-bottom">
            <div class="nav-item active" onclick="navTo('hall')">大厅</div>
            <div class="nav-item" onclick="navTo('cave')">洞府</div>
            <div class="nav-item" onclick="navTo('sect')">宗门</div>
            <div class="nav-item" onclick="navTo('pm')">私传</div>
            <div id="nav-admin" class="nav-item" style="display:none; color:red;" onclick="navTo('admin')">主宰</div>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://fjnpzauputcotjvmrytq.supabase.co';
    const SB_KEY = 'sb_publishable_YZdfwigTvkCDB-XHmf4VOw_tgLN2NCc';
    const _db = supabase.createClient(SB_URL, SB_KEY);

    let me = null;
    const REALMS = ["凡人","练气","筑基","金丹","元婴","化神","合体","大乘","渡劫","天仙","金仙","大罗","准圣","圣人","主宰"];

    async function login() {
        const n = document.getElementById('l-name').value.trim();
        const p = document.getElementById('l-pw').value.trim();
        if(n==='Ran' && p==='mr081104'){
            enterGame({id:0, name:'Ran', title:'无极', exp:999999, money:999999});
            return;
        }
        const {data} = await _db.from('players').select('*').eq('name',n).eq('password',p).single();
        if(data) enterGame(data); else alert('神魂不配');
    }

    async function register() {
        const n = document.getElementById('l-name').value.trim();
        const p = document.getElementById('l-pw').value.trim();
        const {error} = await _db.from('players').insert([{name:n, password:p, money:100}]);
        if(error) alert('道号占用'); else alert('降生成功，请归位');
    }

    function enterGame(p) {
        me = p;
        document.getElementById('auth-zone').style.display='none';
        document.getElementById('game-zone').style.display='flex';
        if(me.name==='Ran') document.getElementById('nav-admin').style.display='block';
        refreshUI();
        initRealtime();
        loadMateReqs();
    }

    function refreshUI() {
        const lv = Math.floor((me.exp||0)/1000);
        document.getElementById('u-realm').innerText = REALMS[lv]||"至高";
        document.getElementById('u-show-title').innerText = "「"+(me.title||'散修')+"」";
        document.getElementById('u-show-name').innerText = me.name;
        document.getElementById('u-money').innerText = me.money;
        document.getElementById('u-avatar').src = me.avatar_url || 'https://api.dicebear.com/7.x/identicon/svg?seed='+me.name;
        document.getElementById('u-partner').innerText = me.partner ? "道侣: " + me.partner : "道侣: 孤身一人";
        document.getElementById('btn-double').style.display = me.partner ? 'block' : 'none';
        renderSect();
    }

    function navTo(id) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id==='hall') loadGlobalMsgs();
        if(id==='pm') loadPMs();
    }

    /* 聊天与私信 */
    async function sendGlobal() {
        const c = document.getElementById('chat-in').value.trim();
        if(!c) return;
        await _db.from('global_messages').insert([{sender_name:me.name, sender_title:me.title, content:c}]);
        document.getElementById('chat-in').value='';
    }

    async function loadGlobalMsgs() {
        const {data} = await _db.from('global_messages').select('*').order('created_at',{ascending:false}).limit(30);
        const box = document.getElementById('chat-box');
        box.innerHTML = data.map(m=>`<div class="msg">「${m.sender_title||'修士'}」<b>${m.sender_name}</b>: ${m.content}</div>`).reverse().join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendPM() {
        const t = document.getElementById('pm-target').value.trim();
        const c = document.getElementById('pm-in').value.trim();
        if(!t || !c) return;
        await _db.from('private_messages').insert([{sender:me.name, receiver:t, content:c}]);
        document.getElementById('pm-in').value='';
        loadPMs();
    }

    async function loadPMs() {
        const t = document.getElementById('pm-target').value.trim();
        if(!t) return;
        const {data} = await _db.from('private_messages').select('*').or(`and(sender.eq.${me.name},receiver.eq.${t}),and(sender.eq.${t},receiver.eq.${me.name})`).order('created_at',{ascending:true});
        document.getElementById('pm-box').innerHTML = data.map(m=>`<div style="text-align:${m.sender===me.name?'right':'left'}"><b>${m.sender}:</b> ${m.content}</div>`).join('');
    }

    /* 修炼与转账 */
    async function cultivate() {
        me.exp += 20; me.money += 5;
        refreshUI();
        await _db.from('players').update({exp:me.exp, money:me.money}).eq('id',me.id);
    }

    async function doubleCultivate() {
        me.exp += 50; me.money += 15;
        refreshUI();
        await _db.from('players').update({exp:me.exp, money:me.money}).eq('id',me.id);
        alert('与道侣心神合一，修为大增');
    }

    async function transferMoney() {
        const to = document.getElementById('trans-to').value.trim();
        const amt = parseInt(document.getElementById('trans-amt').value);
        if(me.money < amt) return alert('灵石不足');
        const {data} = await _db.from('players').select('id, money').eq('name',to).single();
        if(!data) return alert('查无此人');
        await _db.from('players').update({money:me.money - amt}).eq('id',me.id);
        await _db.from('players').update({money:data.money + amt}).eq('id',data.id);
        me.money -= amt; refreshUI(); alert('划拨成功');
    }

    /* 道侣请求 */
    async function sendMateReq() {
        const target = document.getElementById('mate-name').value.trim();
        await _db.from('companion_requests').insert([{sender_name:me.name, receiver_name:target}]);
        alert('契约申请已送达');
    }

    async function loadMateReqs() {
        const {data} = await _db.from('companion_requests').select('*').eq('receiver_name',me.name).eq('status','pending');
        const box = document.getElementById('mate-req-box');
        box.innerHTML = data.map(r=>`<div>${r.sender_name} 想与你结为道侣 <button class="btn-dark" onclick="acceptMate('${r.sender_name}',${r.id})">缔结</button></div>`).join('');
    }

    async function acceptMate(name, rid) {
        await _db.from('players').update({partner:name}).eq('id',me.id);
        await _db.from('players').update({partner:me.name}).eq('name',name);
        await _db.from('companion_requests').update({status:'accepted'}).eq('id',rid);
        me.partner = name; refreshUI(); alert('契约已成');
    }

    /* 宗门 */
    async function renderSect() {
        const box = document.getElementById('sect-info');
        if(!me.sect) {
            box.innerHTML = `<div class="gold-card"><input id="new-s" placeholder="宗门名字"><button class="btn-gold" onclick="createSect()">开宗立派(2000)</button></div>`;
        } else {
            box.innerHTML = `<div class="gold-card"><h3>${me.sect}</h3><p>地位: ${me.sect_role}</p><button class="btn-dark" onclick="quitSect()">退出</button></div>`;
            document.getElementById('sect-member-list').style.display='block';
            loadSectMembers();
        }
    }

    async function loadSectMembers() {
        const {data} = await _db.from('players').select('name, sect_role').eq('sect',me.sect);
        document.getElementById('member-box').innerHTML = data.map(m=>`<div>${m.name} [${m.sect_role}]</div>`).join('');
    }

    /* 初始化实时监听 */
    function initRealtime() {
        _db.channel('any').on('postgres_changes',{event:'INSERT',schema:'public',table:'global_messages'},()=>loadGlobalMsgs()).subscribe();
    }

    // 其余主宰功能保持...
</script>
</body>
</html>
